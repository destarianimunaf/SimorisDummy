<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIMORIS — Sistem Penomoran Surat Otomatis</title>

<!-- Font: Fraunces (display, untuk identitas "surat resmi") + Inter (UI) + JetBrains Mono (nomor surat) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<style>
  :root{
    --ink-900:#12213f; --ink-800:#1a3157; --ink-700:#233f6b; --ink-600:#2c4c7c; --ink-400:#5b729c; --ink-300:#8a9bbd;
    --ink-100:#e3e9f2; --ink-50:#f3f6fa;
    --segel:#c98a2e; --segel-dark:#a8721f; --segel-bg:rgba(201,138,46,.10);
    --paper:#f8f6f1; --paper-2:#efece1;
    --red:#b3413a; --red-bg:#fbe9e7;
    --green:#2f7d5c; --green-bg:#e3f3ea;
    --amber-bg:#fbeed4; --amber:#9a6316;
    --violet:#6a4c93; --violet-bg:#ece5f5;
    --blue-bg:#e3e9f2;
    --slate:#475569; --slate-bg:#eef1f5;
    --font-display:'Fraunces',ui-serif,Georgia,serif;
    --font-body:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --font-mono:'JetBrains Mono',"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
    --shadow-sm:0 1px 2px rgba(18,33,63,.06);
    --shadow-md:0 8px 24px -10px rgba(18,33,63,.22);
    --shadow-lg:0 24px 60px -16px rgba(18,33,63,.35);
    --ease:cubic-bezier(.22,.9,.32,1.09);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; background:var(--paper); color:var(--ink-900);
    font-family:var(--font-body); font-size:14px; line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  .mono{ font-family:var(--font-mono); }
  ::selection{ background:var(--segel-bg); color:var(--ink-900); }
  :focus-visible{ outline:2.5px solid var(--segel); outline-offset:2px; border-radius:4px; }

  /* ---------- surface tekstur kertas resmi ---------- */
  .paper-texture{
    background-image:
      radial-gradient(circle at 100% 0%, rgba(201,138,46,.05), transparent 45%),
      repeating-linear-gradient(135deg, rgba(18,33,63,.018) 0px, rgba(18,33,63,.018) 1px, transparent 1px, transparent 13px);
  }

  header.app-header{ background:linear-gradient(180deg,var(--ink-900),#0e1a33); color:#fff; position:sticky; top:0; z-index:30; box-shadow:0 1px 0 rgba(255,255,255,.06), 0 10px 30px -18px rgba(0,0,0,.6); }
  .wrap{ max-width:1120px; margin:0 auto; padding:0 24px; }
  .header-inner{ display:flex; align-items:center; justify-content:space-between; gap:16px; padding:18px 0; flex-wrap:wrap; }
  .brand{ display:flex; align-items:center; gap:14px; }
  .brand-mark{ width:44px; height:44px; border-radius:10px; background:var(--segel);
    border:1.5px dashed rgba(255,255,255,.5); display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:17px; color:var(--ink-900); font-family:var(--font-display); flex-shrink:0;
    box-shadow:inset 0 0 0 3px rgba(255,255,255,.12); }
  .brand h1{ font-size:19px; margin:0; font-weight:700; letter-spacing:.3px; font-family:var(--font-display); }
  .brand p{ margin:2px 0 0; font-size:11.5px; color:rgba(255,255,255,.62); letter-spacing:.15px; }
  .header-actions{ display:flex; align-items:center; gap:14px; }
  .count-box{ text-align:right; }
  .count-box p{ margin:0; font-size:10.5px; color:rgba(255,255,255,.55); text-transform:uppercase; letter-spacing:.06em; font-weight:600; }
  .count-box strong{ font-size:21px; font-weight:700; font-family:var(--font-mono); color:#fff; }
  .btn{ border:none; cursor:pointer; font-weight:600; font-size:13px; border-radius:9px; padding:10px 16px;
    display:inline-flex; align-items:center; gap:6px; transition:background .15s var(--ease),transform .08s, box-shadow .15s; font-family:var(--font-body); }
  .btn:active{ transform:scale(.97); }
  .btn-segel{ background:var(--segel); color:#20140a; box-shadow:0 1px 0 rgba(255,255,255,.25) inset; }
  .btn-segel:hover{ background:#d99a3d; }
  .btn-segel:disabled{ opacity:.55; cursor:not-allowed; transform:none; }
  .btn-ghost{ background:#fff; color:var(--ink-800); border:1px solid var(--ink-100); }
  .btn-ghost:hover{ background:var(--ink-50); }
  .btn-dark{ background:var(--ink-900); color:#fff; }
  .btn-dark:hover{ background:var(--ink-800); }
  .btn-dark:disabled{ opacity:.55; cursor:not-allowed; }
  .btn-header-ghost{ background:transparent;color:#fff;border:1px solid rgba(255,255,255,.22); }
  .btn-header-ghost:hover{ background:rgba(255,255,255,.08); }
  .btn-header-muted{ background:transparent;color:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.16); padding:10px 12px; }
  .btn-header-muted:hover{ color:#fff; background:rgba(255,255,255,.08); }
  .btn-danger-text{ background:none; color:var(--red); font-weight:600; font-size:12px; padding:4px 6px; border:none; cursor:pointer; border-radius:6px; }
  .btn-danger-text:hover{ background:var(--red-bg); }

  .icon-btn{ width:31px; height:31px; border-radius:8px; border:none; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; transition:background .15s,transform .1s; flex-shrink:0; }
  .icon-btn:active{ transform:scale(.92); }
  .icon-btn svg{ width:15px; height:15px; }
  .icon-btn-edit{ background:var(--ink-50); color:var(--ink-600); }
  .icon-btn-edit:hover{ background:var(--ink-100); color:var(--ink-900); }
  .icon-btn-delete{ background:var(--red-bg); color:var(--red); }
  .icon-btn-delete:hover{ background:#f6cac6; }
  .pill-btn{ display:inline-flex; align-items:center; gap:6px; border:none; border-radius:8px; font-weight:600; font-size:12.5px; padding:9px 12px; cursor:pointer; transition:background .15s,transform .1s; font-family:var(--font-body); }
  .pill-btn:active{ transform:scale(.97); }
  .pill-btn svg{ width:14px; height:14px; flex-shrink:0; }
  .pill-btn-edit{ background:var(--ink-50); color:var(--ink-700); }
  .pill-btn-edit:hover{ background:var(--ink-100); }
  .pill-btn-delete{ background:var(--red-bg); color:var(--red); }
  .pill-btn-delete:hover{ background:#f6cac6; }

  .dropdown-wrap{ position:relative; display:inline-flex; }
  .dropdown-menu{ position:absolute; top:calc(100% + 6px); left:0; background:#fff; border:1px solid var(--ink-100); border-radius:11px; box-shadow:var(--shadow-lg); padding:6px; min-width:175px; z-index:40; animation:pop .13s var(--ease); transform-origin:top left; }
  .dropdown-item{ display:block; width:100%; text-align:left; background:none; border:none; padding:9px 12px; border-radius:7px; font-size:13px; color:var(--ink-800); cursor:pointer; font-weight:500; font-family:var(--font-body); }
  .dropdown-item:hover{ background:var(--ink-50); }
  @media (max-width:760px){ .dropdown-menu{ left:auto; right:0; } }

  main{ padding:26px 0 60px; }
  .toolbar{ display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .toolbar input[type=text], .toolbar select{
    padding:10px 12px; border-radius:9px; border:1px solid var(--ink-100); font-size:13px; background:#fff;
    font-family:inherit; transition:border-color .15s, box-shadow .15s;
  }
  .toolbar input[type=text]:focus, .toolbar select:focus{ outline:none; border-color:var(--ink-600); box-shadow:0 0 0 3px rgba(44,76,124,.12); }
  .toolbar .search{ flex:1; min-width:220px; position:relative; }
  .toolbar .search input{ width:100%; padding-left:34px; }
  .toolbar .search svg{ position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--ink-400); pointer-events:none; }
  .toolbar select{ min-width:220px; }
  .toolbar-right{ display:flex; gap:8px; margin-left:auto; }
  .card{ background:#fff; border:1px solid var(--ink-100); border-radius:14px; box-shadow:var(--shadow-sm),var(--shadow-md); overflow:hidden; }
  table{ width:100%; border-collapse:collapse; }
  thead tr{ background:var(--ink-50); }
  th{ text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-600); font-weight:700; padding:12px 14px; }
  td{ padding:12px 14px; font-size:13px; border-top:1px solid var(--ink-100); vertical-align:middle; }
  tbody tr{ transition:background .1s; }
  tbody tr:hover{ background:#faf9f5; }
  .nomor-badge{ font-weight:700; background:var(--paper); border:1.5px dashed rgba(201,138,46,.55); border-radius:7px; padding:4px 10px; display:inline-block; color:var(--ink-800); letter-spacing:.2px; }
  .badge{ display:inline-flex; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:700; white-space:nowrap; }
  .truncate{ max-width:230px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .empty{ padding:56px 20px; text-align:center; }
  .empty svg{ color:var(--ink-300); margin-bottom:10px; }
  .empty p:first-child{ font-weight:700; margin:0 0 4px; font-family:var(--font-display); font-size:16px; }
  .empty p:last-child{ color:var(--ink-400); font-size:13px; margin:0; }
  .overlay{ position:fixed; inset:0; background:rgba(14,26,51,.55); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; padding:16px; z-index:50; animation:fadeIn .15s var(--ease); }
  .modal{ background:#fff; border-radius:18px; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-lg); animation:modalIn .18s var(--ease); }
  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
  @keyframes modalIn{ from{opacity:0; transform:translateY(10px) scale(.98)} to{opacity:1; transform:translateY(0) scale(1)} }
  @keyframes pop{ from{opacity:0; transform:scale(.94)} to{opacity:1; transform:scale(1)} }
  .modal-head{ padding:19px 22px; border-bottom:1px solid var(--ink-100); display:flex; justify-content:space-between; align-items:center; }
  .modal-head h2{ margin:0; font-size:16.5px; font-weight:700; font-family:var(--font-display); }
  .modal-close{ border:none; background:none; font-size:22px; line-height:1; color:var(--ink-400); cursor:pointer; width:30px;height:30px;border-radius:8px; }
  .modal-close:hover{ background:var(--ink-50); color:var(--ink-800); }
  .modal-body{ padding:22px; display:flex; flex-direction:column; gap:14px; }
  .field label{ display:block; font-size:10.5px; font-weight:700; color:var(--ink-600); margin-bottom:5px; text-transform:uppercase; letter-spacing:.04em; }
  .field input, .field select, .field textarea{ width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--ink-100); font-size:13px; font-family:inherit; transition:border-color .15s, box-shadow .15s; }
  .field input:focus, .field select:focus, .field textarea:focus{ outline:none; border-color:var(--ink-600); box-shadow:0 0 0 3px rgba(44,76,124,.12); }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .preview-box{ background:var(--paper); border:1.5px dashed rgba(201,138,46,.55); border-radius:9px; padding:11px 14px; display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .preview-box span:first-child{ font-size:11px; color:var(--ink-600); font-weight:600; }
  .preview-box span:last-child{ font-weight:700; font-family:var(--font-mono); }
  .form-actions{ display:flex; gap:10px; margin-top:4px; }
  .form-actions button{ flex:1; padding:11px; border-radius:9px; font-weight:700; font-size:13px; cursor:pointer; }
  .error-text{ color:var(--red); font-size:12px; font-weight:600; margin:0; }
  .kode-row{ display:flex; justify-content:space-between; align-items:center; background:var(--paper); border-radius:9px; padding:9px 12px; font-size:13px; gap:8px; }
  .kode-row + .kode-row{ margin-top:6px; }
  .hint{ color:var(--ink-400); font-size:11px; margin:0; }
  .toast{ position:fixed; bottom:22px; right:22px; left:22px; background:var(--ink-900); color:#fff; padding:13px 18px; border-radius:11px; font-size:13px; font-weight:600; box-shadow:var(--shadow-lg); z-index:60; display:flex; align-items:center; gap:10px; animation:toastIn .22s var(--ease); max-width:420px; margin-left:auto; }
  @keyframes toastIn{ from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:translateY(0)} }
  .toast svg{ color:var(--segel); flex-shrink:0; }
  .settings-row{ display:flex; gap:10px; }
  .badge-blue{ background:var(--blue-bg); color:var(--ink-800); }
  .badge-green{ background:var(--green-bg); color:var(--green); }
  .badge-emerald{ background:#e3f3ea; color:#1f6b46; }
  .badge-amber{ background:var(--amber-bg); color:var(--amber); }
  .badge-violet{ background:var(--violet-bg); color:var(--violet); }
  .badge-red{ background:var(--red-bg); color:var(--red); }
  .badge-slate{ background:var(--slate-bg); color:var(--slate); }
  footer.app-footer{ text-align:center; padding:28px 20px; color:var(--ink-400); font-size:12px; line-height:1.9; }
  .banner{ background:#fff8ec; border:1px solid #f0dbb0; color:#8a5a12; font-size:12px; padding:11px 14px; border-radius:11px; margin-bottom:16px; line-height:1.55; display:flex; gap:9px; }
  .banner svg{ flex-shrink:0; margin-top:1px; }
  .visually-hidden{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; }
  .spin{ animation:spin .8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .table-mobile{ display:none; }
  .surat-card{ background:#fff; border:1px solid var(--ink-100); border-radius:13px; padding:14px; margin-bottom:10px; }
  .surat-card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px; }
  .surat-card .nomor-badge{ font-size:12.5px; }
  .surat-card-perihal{ font-weight:700; font-size:13.5px; margin:0 0 4px; line-height:1.35; }
  .surat-card-meta{ color:var(--ink-600); font-size:12.5px; margin:0 0 2px; }
  .surat-card-actions{ display:flex; gap:8px; margin-top:10px; padding-top:10px; border-top:1px solid var(--ink-100); }
  .surat-card-actions .pill-btn{ flex:1; justify-content:center; }

  .row-clickable{ cursor:pointer; }
  .surat-card.row-clickable:active{ background:var(--paper); }
  tbody tr.row-clickable:hover .nomor-badge{ border-color:var(--segel); }

  .detail-hero{ text-align:center; padding:2px 0 6px; }
  .detail-hero .nomor-badge{ font-size:16px; padding:8px 16px; }
  .detail-grid{ display:flex; flex-direction:column; gap:10px; }
  .detail-row{ display:flex; flex-direction:column; gap:3px; padding:11px 12px; background:var(--paper); border-radius:9px; }
  .detail-label{ font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-600); }
  .detail-value{ font-size:14px; color:var(--ink-900); word-break:break-word; line-height:1.4; }

  .pagination{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:13px 14px; flex-wrap:wrap; }
  .pagination-info{ color:var(--ink-600); font-size:12.5px; }
  .pagination-controls{ display:flex; align-items:center; gap:6px; }
  .page-btn{ border:1px solid var(--ink-100); background:#fff; color:var(--ink-800); font-weight:600; font-size:12.5px;
    padding:7px 11px; border-radius:8px; cursor:pointer; min-width:34px; transition:background .12s; }
  .page-btn:hover:not(:disabled){ background:var(--ink-50); }
  .page-btn:disabled{ opacity:.4; cursor:not-allowed; }
  .page-btn.active{ background:var(--ink-900); color:#fff; border-color:var(--ink-900); }
  .page-jump{ display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--ink-600); }
  .page-size-select{ padding:7px 9px; border-radius:8px; border:1px solid var(--ink-100); font-size:12.5px; background:#fff; }

  @media (max-width:760px){
    .pagination{ flex-direction:column; align-items:stretch; text-align:center; }
    .pagination-controls{ justify-content:center; flex-wrap:wrap; }
  }

  .login-wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; background:var(--ink-900);
    background-image:radial-gradient(circle at 15% 10%, rgba(201,138,46,.14), transparent 45%), radial-gradient(circle at 85% 90%, rgba(44,76,124,.35), transparent 50%); }
  .login-card{ background:#fff; border-radius:18px; width:100%; max-width:380px; padding:34px 30px; box-shadow:var(--shadow-lg); animation:modalIn .25s var(--ease); }
  .login-brand{ display:flex; flex-direction:column; align-items:center; text-align:center; margin-bottom:26px; }
  .login-brand .brand-mark{ background:var(--segel); border:1.5px dashed rgba(201,138,46,.55); color:var(--ink-900); margin-bottom:13px; width:52px; height:52px; font-size:20px; }
  .login-brand h1{ font-size:20px; margin:0; font-weight:700; color:var(--ink-900); font-family:var(--font-display); }
  .login-brand p{ margin:5px 0 0; font-size:12.5px; color:var(--ink-400); }
  .login-card .field{ margin-bottom:16px; }
  .login-card button[type=submit]{ width:100%; padding:12px; border-radius:9px; font-weight:700; font-size:13.5px; cursor:pointer; }
  .login-hint{ text-align:center; margin-top:16px; font-size:11.5px; color:var(--ink-300); }

  .danger-zone{ border:1px solid rgba(179,65,58,.3); background:#fef4f3; border-radius:11px; padding:14px; }
  .code-snippet{ width:100%; font-family:var(--font-mono); font-size:11px; line-height:1.5; padding:10px; border-radius:9px; border:1px solid var(--ink-100); background:var(--paper); resize:vertical; color:var(--ink-800); }

  @media (max-width:760px){
    .wrap{ padding:0 16px; }
    body{ font-size:13.5px; }
    .header-inner{ padding:15px 0; gap:12px; }
    .brand h1{ font-size:16px; }
    .brand-mark{ width:38px;height:38px;font-size:15px; }
    .header-actions{ width:100%; justify-content:space-between; gap:8px; }
    .count-box{ display:none; }
    #btnKelola{ padding:9px 12px; font-size:12.5px; }
    #btnTambah{ flex:1; justify-content:center; }
    .toolbar{ gap:8px; }
    .toolbar select{ min-width:0; width:100%; }
    .toolbar-right{ margin-left:0; width:100%; gap:8px; flex-wrap:wrap; }
    .toolbar-right .btn{ flex:1 1 calc(50% - 4px); justify-content:center; padding:9px 8px; font-size:12px; white-space:nowrap; }
    .toolbar-right .dropdown-wrap{ flex:1 1 calc(50% - 4px); }
    .toolbar-right .dropdown-wrap .btn{ width:100%; }
    .grid2{ grid-template-columns:1fr; }
    .modal{ max-width:100%; border-radius:16px 16px 0 0; align-self:flex-end; }
    .overlay{ align-items:flex-end; padding:0; }
    .modal-body{ padding:18px; }
    .table-desktop{ display:none; }
    .table-mobile{ display:block; }
    .toast{ left:14px; right:14px; bottom:14px; max-width:none; }
  }
  @media print{
    header, .toolbar, .banner, .btn, .empty p:last-child{ display:none !important; }
    body{ background:#fff; }
    .card{ box-shadow:none; border:none; }
    .table-mobile{ display:none !important; }
    .table-desktop{ display:block !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ============================== KONSTANTA ============================== */

const STORE_KEY = "simoris_data_v1";
const AUTH_KEY = "simoris_authed_v1";
const PW_HASH_KEY = "simoris_pw_hash_v1";
// Hash dari kata sandi bawaan "simoris2026" — GANTI setelah login pertama
// lewat "Kelola Kode" -> "Ubah kata sandi akses".
const DEFAULT_PW_HASH = "ca861d55";

const WARNA_CLASS = { blue:"badge-blue", green:"badge-green", emerald:"badge-emerald", amber:"badge-amber", violet:"badge-violet", red:"badge-red", slate:"badge-slate" };
const WARNA_CYCLE = ["blue","green","emerald","amber","violet","red","slate"];
const DEFAULT_KODE = [{ id:1, kode:"UM", nama:"Umum", warna:"emerald", aktif:true }];
const BULAN_ID = { "januari":0,"februari":1,"maret":2,"april":3,"mei":4,"juni":5,"juli":6,"agustus":7,"september":8,"oktober":9,"november":10,"desember":11 };
const BULAN_NAMA = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];

const APPS_SCRIPT_SNIPPET =

function simpleHash(str){
  let hash = 5381;
  for(let i=0;i<str.length;i++){ hash = ((hash << 5) + hash + str.charCodeAt(i)) >>> 0; }
  return hash.toString(16);
}
function getStoredPwHash(){ try{ return localStorage.getItem(PW_HASH_KEY) || DEFAULT_PW_HASH; }catch(e){ return DEFAULT_PW_HASH; } }
function setStoredPwHash(h){ try{ localStorage.setItem(PW_HASH_KEY, h); }catch(e){} }
function isAuthedStorage(){ try{ return localStorage.getItem(AUTH_KEY) === "1"; }catch(e){ return false; } }
function setAuthedStorage(v){ try{ localStorage.setItem(AUTH_KEY, v?"1":"0"); }catch(e){} }

function isoToday(offset){ const d = new Date(); d.setDate(d.getDate() + (offset||0)); return d.toISOString().slice(0,10); }

function pad2(n){ n = String(n); return n.length<2 ? "0"+n : n; }

function kodeOf(S, id){ return S.kodeList.find(function(k){ return k.id===id; }) || null; }
function aktifKode(S){ return S.kodeList.filter(function(k){ return k.aktif; }); }
function nomorSurat(S, urut, kodeId){

function displayNomor(S, s){ return s.nomorOverride || nomorSurat(S, s.urut, s.kodeId); }
function fmtTanggal(iso){
  if(!iso) return "—";

  if(isNaN(d)) return "—";
  return d.getDate()+" "+BULAN_NAMA[d.getMonth()]+" "+d.getFullYear();
}
function ensureKodeInDraft(draft, kodeStr){

function parseTanggalIndo(str){
  if(!str) return null;
  str = String(str).trim();
  const iso = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(iso) return iso[1]+"-"+pad2(iso[2])+"-"+pad2(iso[3]);
  const slash = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(slash) return slash[3]+"-"+pad2(slash[1])+"-"+pad2(slash[2]);
  const indo = str.match(/^(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})$/);
  if(indo){
    const bulanIdx = BULAN_ID[indo[2].toLowerCase()];
    if(bulanIdx !== undefined) return indo[3]+"-"+pad2(bulanIdx+1)+"-"+pad2(indo[1]);
  }
  return null;
}
function parseCsv(text){
  const rows = []; let i=0, field="", row=[], inQuotes=false;
  text = text.replace(/^\uFEFF/, "");
  while(i < text.length){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){ if(text[i+1] === '"'){ field += '"'; i+=2; continue; } inQuotes=false; i++; continue; }
      field += c; i++; continue;
    } else {
      if(c === '"'){ inQuotes=true; i++; continue; }
      if(c === ','){ row.push(field); field=""; i++; continue; }
      if(c === '\r'){ i++; continue; }
      if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=""; i++; continue; }
      field += c; i++; continue;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(function(r){ return r.some(function(c){ return String(c).trim() !== ""; }); });
}
function colIndex(header, keywords){
  for(let i=0;i<header.length;i++){
    const h = String(header[i]||"").toLowerCase();
    for(let j=0;j<keywords.length;j++){ if(h.indexOf(keywords[j]) > -1) return i; }
  }
  return -1;
}
function detectColumns(rows){
  let headerIdx = 0;
  for(let hi=0; hi<Math.min(rows.length,10); hi++){
    if(colIndex(rows[hi], ["perihal"]) > -1){ headerIdx = hi; break; }
  }
  const header = rows[headerIdx];
  return {
    headerIdx: headerIdx,
    idxTujuan: colIndex(header, ["tujuan"]),
    idxTanggal: colIndex(header, ["tanggal"]),
    idxPerihal: colIndex(header, ["perihal"]),
    idxNomor: colIndex(header, ["nomor surat","nomor","no surat","no."]),
    idxKode: colIndex(header, ["kode klasifikasi","klasifikasi","kode"])
  };
}
function parseRowsToSurats(rows, cols){
  const out = [];
  for(let r=cols.headerIdx+1; r<rows.length; r++){
    const c = rows[r];
    const perihal = cols.idxPerihal>-1 ? String(c[cols.idxPerihal]||"").trim() : "";
    if(!perihal) continue;
    out.push({
      tujuan: cols.idxTujuan>-1 ? String(c[cols.idxTujuan]||"").trim() : "",
      tanggalRaw: cols.idxTanggal>-1 ? String(c[cols.idxTanggal]||"").trim() : "",
      perihal: perihal,
      nomorRaw: cols.idxNomor>-1 ? String(c[cols.idxNomor]||"").trim() : "",
      kodeExplicit: cols.idxKode>-1 ? String(c[cols.idxKode]||"").trim() : ""
    });
  }
  return out;
}
function parseNomorRaw(nomorRaw){
  if(!nomorRaw) return null;
  const parts = nomorRaw.split("-");
  if(parts.length >= 3){
    const urutStr = parts[parts.length-1];
    const kodeStr = parts.slice(1, parts.length-1).join("-");
    if(/^\d+$/.test(urutStr) && kodeStr) return { urut: parseInt(urutStr,10), kodeStr: kodeStr };
  }
  return null;
}
function excelCellToStr(v){
  if(v instanceof Date && !isNaN(v)) return v.getFullYear()+"-"+pad2(v.getMonth()+1)+"-"+pad2(v.getDate());
  if(v === null || v === undefined) return "";
  return String(v).trim();
}
function applyImportToDraft(draft, parsedRows){
  const existingNomor = {};
  draft.surats.forEach(function(s){ existingNomor[displayNomor(draft,s)] = true; });
  parsedRows.forEach(function(pr){
    const parsed = parseNomorRaw(pr.nomorRaw);
    if(parsed && parsed.urut > draft.counter) draft.counter = parsed.urut;
  });
  let kodeUmum=null, ditambahkan=0, dilewati=0, maxUrutImpor=0;
  parsedRows.forEach(function(pr){
    const tanggal = parseTanggalIndo(pr.tanggalRaw) || isoToday(0);
    let kodeObj=null, urut=null;
    const parsed = parseNomorRaw(pr.nomorRaw);
    if(parsed){ urut = parsed.urut; kodeObj = ensureKodeInDraft(draft, parsed.kodeStr); }
    if(!kodeObj && pr.kodeExplicit) kodeObj = ensureKodeInDraft(draft, pr.kodeExplicit);
    if(!kodeObj){ if(!kodeUmum) kodeUmum = ensureKodeInDraft(draft, "IMPOR"); kodeObj = kodeUmum; }
    if(urut === null){ draft.counter += 1; urut = draft.counter; }
    const nomorFinal = pr.nomorRaw || nomorSurat(draft, urut, kodeObj.id);
    if(existingNomor[nomorFinal]){ dilewati++; return; }
    existingNomor[nomorFinal] = true;
    draft.surats.push({ id:uid(), urut:urut, kodeId:kodeObj.id, tujuan:pr.tujuan, perihal:pr.perihal, tanggal:tanggal, dibuatOleh:"", sumber:"manual", nomorOverride: pr.nomorRaw||null });
    ditambahkan++;
    if(urut > maxUrutImpor) maxUrutImpor = urut;
  });
  if(maxUrutImpor > draft.counter) draft.counter = maxUrutImpor;
  draft.surats.sort(function(a,b){ return b.urut - a.urut; });
  return { ditambahkan: ditambahkan, dilewati: dilewati };
}
function extractSheetId(url){ const m = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/); return m ? m[1] : null; }
function extractGid(url){ const m = url.match(/[#&?]gid=([0-9]+)/); return m ? m[1] : "0"; }
function buildCandidateCsvUrls(rawUrl){
  const url = rawUrl.trim();
  if(/output=csv|format=csv|tqx=out:csv/.test(url)) return [url];
  const id = extractSheetId(url);
  if(!id) return [];
  const gid = extractGid(url);
  return [
    "https://docs.google.com/spreadsheets/d/"+id+"/export?format=csv&gid="+gid,
    "https://docs.google.com/spreadsheets/d/"+id+"/gviz/tq?tqx=out:csv&gid="+gid
  ];
}
async function tryFetchCsv(urls, timeoutMs){
  let lastErr = null;
  for(let i=0;i<urls.length;i++){
    try{
      const hasAbort = typeof AbortController !== "undefined";
      const controller = hasAbort ? new AbortController() : null;
      const timer = controller ? setTimeout(function(){ controller.abort(); }, timeoutMs) : null;
      const res = await fetch(urls[i], { cache:"no-store", signal: controller ? controller.signal : undefined });
      if(timer) clearTimeout(timer);
      if(!res.ok) throw new Error("HTTP "+res.status);
      const text = await res.text();
      if(/^\s*<(!doctype|html)/i.test(text) || /accounts\.google\.com\/ServiceLogin/i.test(text)){
        throw new Error("Sheet mengembalikan halaman login/HTML, bukan data — sheet belum bisa diakses publik.");
      }
      if(!text || !text.trim()) throw new Error("Sheet mengembalikan data kosong.");
      return text;
    }catch(err){ lastErr = err; }
  }
  throw lastErr || new Error("Semua percobaan pengambilan data gagal.");
}
async function requestNomorFromSheet(S, kodeStr, tujuan, tanggal, perihal){
  const url = (S.settings.appsScriptUrl||"").trim();
  if(!url) return { ok:false };
  const qs = "kode="+encodeURIComponent(kodeStr)+"&instansi="+encodeURIComponent(S.settings.instansiKode)+
    "&digit="+encodeURIComponent(S.settings.digit)+"&tujuan="+encodeURIComponent(tujuan||"")+
    "&tanggal="+encodeURIComponent(fmtTanggal(tanggal))+"&perihal="+encodeURIComponent(perihal||"");
  try{
    const hasAbort = typeof AbortController !== "undefined";
    const controller = hasAbort ? new AbortController() : null;
    const timer = controller ? setTimeout(function(){ controller.abort(); }, 12000) : null;
    const res = await fetch(url + (url.indexOf("?")>-1 ? "&" : "?") + qs, { method:"GET", signal: controller ? controller.signal : undefined });
    if(timer) clearTimeout(timer);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    if(!data || !data.ok) throw new Error("respons tidak valid");
    return { ok:true, urut:data.urut, nomor:data.nomor };
  }catch(e){ return { ok:false }; }
}
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function exportCsvFile(S, rows){
  const header = ["No","Nomor Surat","Tanggal","Tujuan","Perihal","Kode Klasifikasi"];
  const lines = [header.join(",")];
  rows.forEach(function(s){
    const k = kodeOf(S, s.kodeId);
    const cells = [s.urut, displayNomor(S,s), fmtTanggal(s.tanggal), s.tujuan||"", s.perihal, k?k.kode:""].map(function(c){
      const v = String(c).replace(/"/g,'""');
      return /[",\n]/.test(v) ? '"'+v+'"' : v;
    });
    lines.push(cells.join(","));
  });
  downloadBlob(new Blob(["\uFEFF"+lines.join("\r\n")], { type:"text/csv;charset=utf-8;" }), "simoris-rekap-"+isoToday(0)+".csv");
}
function exportExcelFile(S, rows){
  if(typeof XLSX === "undefined") return false;
  const sorted = rows.slice().sort(function(a,b){ return a.urut-b.urut; });
  const data = [["NO","TUJUAN SURAT","TANGGAL SURAT","PERIHAL","NOMOR SURAT KELUAR / SURAT PERINTAH"]];
  sorted.forEach(function(s, idx){ data.push([idx+1, s.tujuan||"", fmtTanggal(s.tanggal), s.perihal, displayNomor(S,s)]); });
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:5},{wch:22},{wch:18},{wch:42},{wch:30}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "SIMORIS");
  XLSX.writeFile(wb, "simoris-rekap-"+isoToday(0)+".xlsx");
  return true;
}
function exportPdfFile(S, rows){
  if(typeof window.jspdf === "undefined") return false;
  const sorted = rows.slice().sort(function(a,b){ return a.urut-b.urut; });
  const body = sorted.map(function(s, idx){ return [idx+1, s.tujuan||"-", fmtTanggal(s.tanggal), s.perihal, displayNomor(S,s)]; });
  const doc = new window.jspdf.jsPDF({ orientation:"landscape", unit:"pt", format:"a4" });
  doc.setFontSize(13); doc.text("SIMORIS - Rekap Surat", 40, 34);
  doc.setFontSize(9); doc.setTextColor(120);
  doc.text("Diunduh "+fmtTanggal(isoToday(0))+" - "+sorted.length+" surat", 40, 48);
  doc.autoTable({
    startY:60, head:[["No","Tujuan Surat","Tanggal Surat","Perihal","Nomor Surat"]], body:body,
    styles:{ fontSize:9, cellPadding:6 }, headStyles:{ fillColor:[18,33,63], textColor:255, fontStyle:"bold" },
    alternateRowStyles:{ fillColor:[248,246,241] }, columnStyles:{ 0:{ cellWidth:30 } }
  });
  doc.save("simoris-rekap-"+isoToday(0)+".pdf");
  return true;
}

}

function Pagination({ page, totalPages, total, pageSize, start, onPrev, onNext, onPage, onPageSize }){
  const from = total ? start+1 : 0;
  const to = Math.min(start+pageSize, total);
  let lo = Math.max(1, page-2), hi = Math.min(totalPages, page+2);
  if(page<=3) hi = Math.min(totalPages, 5);
  if(page>=totalPages-2) lo = Math.max(1, totalPages-4);
  const nums = [];
  for(let i=lo;i<=hi;i++) nums.push(i);
  return (
    <div className="pagination">
      <div className="pagination-info">Menampilkan <b>{from}–{to}</b> dari <b>{total}</b> surat</div>
      <div className="pagination-controls">
        <button className="page-btn" disabled={page<=1} onClick={onPrev}>‹ Sebelumnya</button>
        {lo>1 && <button className="page-btn" onClick={()=>onPage(1)}>1</button>}
        {lo>2 && <span style={{padding:"0 2px",color:"var(--ink-400)"}}>…</span>}
        {nums.map(n => <button key={n} className={"page-btn"+(n===page?" active":"")} onClick={()=>onPage(n)}>{n}</button>)}
        {hi<totalPages-1 && <span style={{padding:"0 2px",color:"var(--ink-400)"}}>…</span>}
        {hi<totalPages && <button className="page-btn" onClick={()=>onPage(totalPages)}>{totalPages}</button>}
        <button className="page-btn" disabled={page>=totalPages} onClick={onNext}>Berikutnya ›</button>
      </div>
      <div className="pagination-controls">
        <label className="page-jump">Per halaman
          <select className="page-size-select" value={pageSize} onChange={function(e){ onPageSize(Number(e.target.value)); }} style={{marginLeft:6}}>
            {[25,50,100,200,500].map(n => <option key={n} value={n}>{n}</option>)}
          </select>
        </label>
      </div>
    </div>
  );
}

function LoginScreen({ onSuccess }){

    e.preventDefault();
    if(simpleHash(pw) === getStoredPwHash()){
      setAuthedStorage(true);
      onSuccess();
    } else {
      setErr("Kata sandi salah. Coba lagi.");
      setPw("");
      if(inputRef.current) inputRef.current.focus();
    }
  }

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-brand">
          <div className="brand-mark">№</div>
          <h1>SIMORIS</h1>
          <p>Masuk untuk mengakses sistem penomoran surat</p>
        </div>
        <form onSubmit={submit}>
          <div className="field">
            <label>Kata Sandi</label>
            <input ref={inputRef} type="password" value={pw} onChange={function(e){ setPw(e.target.value); }} placeholder="Masukkan kata sandi" autoFocus />
          </div>
          {err && <p className="error-text" style={{marginBottom:14}}>{err}</p>}
          <button type="submit" className="btn-dark">Masuk</button>
        </form>
        <p className="login-hint">Kata sandi bawaan: <span className="mono">simoris2026</span> (ubah setelah masuk lewat Kelola Kode)</p>
      </div>
    </div>
  );
}

function SuratModal({ open, editing, S, onClose, onSubmit, submitting }){
  const opsiKodeBase = aktifKode(S);
  const [kodeId, setKodeId] = useState(null);
  const [tanggal, setTanggal] = useState(isoToday(0));
  const [tujuan, setTujuan] = useState("");
  const [perihal, setPerihal] = useState("");
  const [dibuatOleh, setDibuatOleh] = useState("");
  const [error, setError] = useState("");

  useEffect(function(){
    if(!open) return;
    if(editing){
      setKodeId(editing.kodeId);
      setTanggal(editing.tanggal);
      setTujuan(editing.tujuan||"");
      setPerihal(editing.perihal||"");
      setDibuatOleh(editing.dibuatOleh||"");
    } else {
      setKodeId(opsiKodeBase[0] ? opsiKodeBase[0].id : null);
      setTanggal(isoToday(0));
      setTujuan(""); setPerihal(""); setDibuatOleh("");
    }
    setError("");
  }, [open, editing]);

  if(!open) return null;

  let opsiKode = opsiKodeBase;
  if(editing){
    const kodeEditing = kodeOf(S, editing.kodeId);
    if(kodeEditing && !kodeEditing.aktif) opsiKode = opsiKode.concat([kodeEditing]);
  }

  const previewUrut = editing ? editing.urut : (S.counter + 1);
  let preview;
  if(editing && editing.nomorOverride && kodeId === editing.kodeId){
    preview = editing.nomorOverride;
  } else {
    preview = kodeId ? nomorSurat(S, previewUrut, kodeId) : "—";
  }

  function submit(){
    if(!kodeId){ setError("Pilih kode klasifikasi."); return; }
    if(!tanggal){ setError("Tanggal surat wajib diisi."); return; }
    if(!perihal.trim()){ setError("Perihal wajib diisi."); return; }
    setError("");
    onSubmit({ kodeId: Number(kodeId), tanggal: tanggal, tujuan: tujuan.trim(), perihal: perihal.trim(), dibuatOleh: dibuatOleh.trim() });
  }

  return (
    <div className="overlay" onClick={function(e){ if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal">
        <div className="modal-head">
          <h2>{editing ? "Ubah Surat" : "Terbitkan Nomor Baru"}</h2>
          <button className="modal-close" onClick={onClose}>&times;</button>
        </div>
        <div className="modal-body">
          <div className="preview-box">
            <span>{editing ? "Nomor surat (tidak dapat diubah)" : "Nomor surat akan menjadi"}</span>
            <span className="mono">{preview}</span>
          </div>
          {!opsiKodeBase.length && <p className="error-text">Belum ada kode klasifikasi aktif. Tambahkan lewat "Kelola Kode" dulu.</p>}
          <div className="field">
            <label>Kode Klasifikasi</label>
            <select value={kodeId||""} onChange={function(e){ setKodeId(Number(e.target.value)); }}>
              {opsiKode.map(k => <option key={k.id} value={k.id}>{k.kode} — {k.nama}{k.aktif?"":" (nonaktif)"}</option>)}
            </select>
          </div>
          <div className="grid2">
            <div className="field"><label>Tanggal Surat</label><input type="date" value={tanggal} onChange={function(e){ setTanggal(e.target.value); }}/></div>
            <div className="field"><label>Tujuan Surat</label><input type="text" placeholder="Nama/bagian tujuan" value={tujuan} onChange={function(e){ setTujuan(e.target.value); }}/></div>
          </div>
          <div className="field"><label>Perihal</label><input type="text" placeholder="Contoh: PAK Cory / Surat Undangan Rapat" value={perihal} onChange={function(e){ setPerihal(e.target.value); }}/></div>
          <div className="field"><label>Dibuat oleh (opsional)</label><input type="text" placeholder="Nama petugas" value={dibuatOleh} onChange={function(e){ setDibuatOleh(e.target.value); }}/></div>
          {error && <p className="error-text">{error}</p>}
          <div className="form-actions">
            <button className="btn-ghost" onClick={onClose} disabled={submitting}>Batal</button>
            <button className="btn-dark" onClick={submit} disabled={!opsiKodeBase.length || submitting}>
              {submitting ? "Menerbitkan..." : (editing ? "Simpan Perubahan" : "Terbitkan")}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================== MODAL: KELOLA KODE ============================== */

function KelolaModal({ open, S, onClose, mutateS, showToast, showNotice, showConfirm, onOpenHapusSemua, onTestRefresh }){
  const [newKode, setNewKode] = useState("");
  const [newNama, setNewNama] = useState("");
  const [kodeErr, setKodeErr] = useState("");

  const [setInstansi, setSetInstansi] = useState(S.settings.instansiKode);
  const [setDigit, setSetDigit] = useState(S.settings.digit);

  const [sheetUrl, setSheetUrl] = useState(S.settings.googleSheetUrl||"");
  const [sheetUrlErr, setSheetUrlErr] = useState("");

  const [pwOld, setPwOld] = useState(""); const [pwNew, setPwNew] = useState(""); const [pwNewConfirm, setPwNewConfirm] = useState("");
  const [pwErr, setPwErr] = useState("");

  const [appsExpanded, setAppsExpanded] = useState(false);
  const [appsUrl, setAppsUrl] = useState(S.settings.appsScriptUrl||"");
  const [appsErr, setAppsErr] = useState("");
  const [copied, setCopied] = useState(false);

  useEffect(function(){
    if(open){
      setSetInstansi(S.settings.instansiKode);
      setSetDigit(S.settings.digit);
      setSheetUrl(S.settings.googleSheetUrl||"");
      setAppsUrl(S.settings.appsScriptUrl||"");
      setNewKode(""); setNewNama(""); setKodeErr("");
      setPwOld(""); setPwNew(""); setPwNewConfirm(""); setPwErr("");
      setSheetUrlErr(""); setAppsErr("");
    }
  }, [open]);

  if(!open) return null;

  function addKode(){
    const kode = newKode.trim(), nama = newNama.trim();
    if(!kode || !nama){ setKodeErr("Isi kode dan nama."); return; }
    const dup = S.kodeList.some(function(k){ return k.kode.toLowerCase()===kode.toLowerCase(); });
    if(dup){ setKodeErr("Kode ini sudah ada."); return; }
    mutateS(function(draft){
      draft.kodeList.push({ id:uid(), kode:kode, nama:nama, warna:WARNA_CYCLE[draft.kodeList.length % WARNA_CYCLE.length], aktif:true });
    });
    setKodeErr(""); setNewKode(""); setNewNama("");
    showToast("Kode "+kode+" ditambahkan.");
  }
  function toggleAktif(id, aktif){
    mutateS(function(draft){ const k = draft.kodeList.find(x=>x.id===id); if(k) k.aktif = aktif; });
  }
  function saveSettings(){
    const instansi = setInstansi.trim() || "W.9";
    const digit = Math.max(1, Math.min(6, Number(setDigit)||3));
    mutateS(function(draft){ draft.settings.instansiKode = instansi; draft.settings.digit = digit; });
    showToast("Pengaturan disimpan.");
  }
  function saveSheetUrl(){
    const url = sheetUrl.trim();
    if(url && !/^https:\/\/docs\.google\.com\/spreadsheets\//.test(url)){
      setSheetUrlErr("Tautan sepertinya bukan tautan Google Sheets. Pastikan diawali https://docs.google.com/spreadsheets/...");
      return;
    }
    setSheetUrlErr("");
    mutateS(function(draft){ draft.settings.googleSheetUrl = url; });
    showToast(url ? "Tautan Google Sheet disimpan." : "Tautan Google Sheet dikosongkan.");
  }
  function testRefresh(){
    const url = sheetUrl.trim();
    if(!url){ setSheetUrlErr("Isi tautan Google Sheet terlebih dahulu."); return; }
    if(!/^https:\/\/docs\.google\.com\/spreadsheets\//.test(url)){
      setSheetUrlErr("Tautan sepertinya bukan tautan Google Sheets. Pastikan diawali https://docs.google.com/spreadsheets/...");
      return;
    }
    setSheetUrlErr("");
    mutateS(function(draft){ draft.settings.googleSheetUrl = url; });
    onClose();
    onTestRefresh(url);
  }
  function changePw(){
    if(simpleHash(pwOld) !== getStoredPwHash()){ setPwErr("Kata sandi saat ini salah."); return; }
    if(pwNew.length < 4){ setPwErr("Kata sandi baru minimal 4 karakter."); return; }
    if(pwNew !== pwNewConfirm){ setPwErr("Konfirmasi kata sandi baru tidak cocok."); return; }
    setStoredPwHash(simpleHash(pwNew));
    setPwOld(""); setPwNew(""); setPwNewConfirm(""); setPwErr("");
    showToast("Kata sandi berhasil diubah.");
  }
  function copySnippet(){
    function done(){ setCopied(true); setTimeout(function(){ setCopied(false); }, 1800); }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(APPS_SCRIPT_SNIPPET).then(done).catch(done);
    } else { done(); }
  }
  function saveAppsUrl(){
    const url = appsUrl.trim();
    if(url && !/^https:\/\/script\.google\.com\/macros\//.test(url)){
      setAppsErr("URL sepertinya bukan URL Web App Apps Script. Harus diawali https://script.google.com/macros/...");
      return;
    }
    setAppsErr("");
    mutateS(function(draft){ draft.settings.appsScriptUrl = url; });
    showToast(url ? "URL tulis-balik disimpan." : "URL tulis-balik dikosongkan.");
  }

  return (
    <div className="overlay" onClick={function(e){ if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal">
        <div className="modal-head"><h2>Kelola Kode Klasifikasi</h2><button className="modal-close" onClick={onClose}>&times;</button></div>
        <div className="modal-body">
          <div className="banner"><IconInfo size={15}/><span>Kode klasifikasi ditambahkan manual sesuai kebutuhan kantor Anda. Yang otomatis hanya deret nomor urut di belakang (mis. ...-001, ...-002, dst).</span></div>

          <div>
            {S.kodeList.map(function(k){
              return (
                <div className="kode-row" key={k.id}>
                  <div><b className="mono">{k.kode}</b> &nbsp;{k.nama}{!k.aktif && <span style={{color:"var(--ink-400)"}}> (nonaktif)</span>}</div>
                  {k.aktif
                    ? <button className="btn-danger-text" onClick={function(){ toggleAktif(k.id, false); }}>Nonaktifkan</button>
                    : <button className="btn-danger-text" style={{color:"var(--green)"}} onClick={function(){ toggleAktif(k.id, true); }}>Aktifkan</button>}
                </div>
              );
            })}
          </div>

          <div style={{borderTop:"1px solid var(--ink-100)",paddingTop:14}}>
            <p className="hint" style={{marginBottom:8,fontWeight:700,color:"var(--ink-600)",textTransform:"uppercase",fontSize:11}}>Tambah kode manual</p>
            <div className="grid2">
              <div className="field"><label>Kode</label><input type="text" placeholder="mis. KP atau KP.10.02" value={newKode} onChange={function(e){ setNewKode(e.target.value); }}/></div>
              <div className="field"><label>Nama</label><input type="text" placeholder="mis. Kepegawaian" value={newNama} onChange={function(e){ setNewNama(e.target.value); }}/></div>
            </div>
            {kodeErr && <p className="error-text" style={{marginTop:8}}>{kodeErr}</p>}
            <button className="btn-dark" onClick={addKode} style={{width:"100%",marginTop:10,padding:10,borderRadius:8}}>+ Tambah Kode</button>
          </div>

          <div style={{borderTop:"1px solid var(--ink-100)",paddingTop:14}}>
            <p className="hint" style={{marginBottom:8,fontWeight:700,color:"var(--ink-600)",textTransform:"uppercase",fontSize:11}}>Pengaturan penomoran</p>
            <div className="settings-row">
              <div className="field" style={{flex:1}}><label>Kode Instansi</label><input type="text" value={setInstansi} onChange={function(e){ setSetInstansi(e.target.value); }}/></div>
              <div className="field" style={{width:110}}><label>Digit Nomor</label><input type="number" min="1" max="6" value={setDigit} onChange={function(e){ setSetDigit(e.target.value); }}/></div>
            </div>
            <button className="btn-ghost" onClick={saveSettings} style={{width:"100%",marginTop:8,padding:10,borderRadius:8}}>Simpan Pengaturan</button>
          </div>

          <div style={{borderTop:"1px solid var(--ink-100)",paddingTop:14}}>
            <p className="hint" style={{marginBottom:8,fontWeight:700,color:"var(--ink-600)",textTransform:"uppercase",fontSize:11}}>Sumber data Google Sheet (opsional)</p>
            <p className="hint" style={{marginBottom:10,lineHeight:1.5}}>Tempel tautan <b>Bagikan</b> biasa dari Google Sheets — tidak perlu Publikasikan ke Web atau mengubah data master. Cukup: klik <b>Bagikan</b> di kanan atas sheet → ubah akses umum menjadi "Siapa saja yang memiliki tautan → Dapat melihat" → salin tautannya → tempel di sini.</p>
            <div className="field"><label>Tautan Google Sheet</label><input type="text" placeholder="https://docs.google.com/spreadsheets/d/XXXXXXXX/edit" value={sheetUrl} onChange={function(e){ setSheetUrl(e.target.value); }}/></div>
            {sheetUrlErr && <p className="error-text" style={{marginTop:8}}>{sheetUrlErr}</p>}
            <div className="form-actions" style={{marginTop:10}}>
              <button className="btn-ghost" onClick={saveSheetUrl}>Simpan Tautan</button>
              <button className="btn-dark" onClick={testRefresh}>Simpan &amp; Refresh Sekarang</button>
            </div>
          </div>

          <div style={{borderTop:"1px solid var(--ink-100)",paddingTop:14}}>
            <p className="hint" style={{marginBottom:8,fontWeight:700,color:"var(--ink-600)",textTransform:"uppercase",fontSize:11}}>Ubah kata sandi akses</p>
            <div className="field"><label>Kata sandi saat ini</label><input type="password" placeholder="Kata sandi saat ini" value={pwOld} onChange={function(e){ setPwOld(e.target.value); }}/></div>
            <div className="grid2" style={{marginTop:10}}>
              <div className="field"><label>Kata sandi baru</label><input type="password" placeholder="Minimal 4 karakter" value={pwNew} onChange={function(e){ setPwNew(e.target.value); }}/></div>
              <div className="field"><label>Ulangi kata sandi baru</label><input type="password" placeholder="Ulangi kata sandi baru" value={pwNewConfirm} onChange={function(e){ setPwNewConfirm(e.target.value); }}/></div>
            </div>
            {pwErr && <p className="error-text" style={{marginTop:8}}>{pwErr}</p>}
            <button className="btn-dark" onClick={changePw} style={{width:"100%",marginTop:10,padding:10,borderRadius:8}}>Ubah Kata Sandi</button>
          </div>

          <div style={{borderTop:"1px solid var(--ink-100)",paddingTop:14}}>
            <button onClick={function(){ setAppsExpanded(!appsExpanded); }} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",background:"none",border:"none",padding:0,cursor:"pointer",textAlign:"left"}}>
              <span className="hint" style={{fontWeight:700,color:"var(--ink-600)",textTransform:"uppercase",fontSize:11}}>Tulis balik ke Google Sheet (lanjutan, opsional)</span>
              <span style={{color:"var(--ink-400)",transition:"transform .15s",transform:appsExpanded?"rotate(180deg)":"none"}}><IconChevronDown size={14}/></span>
            </button>
            {S.settings.appsScriptUrl
              ? <p className="hint" style={{marginTop:6,color:"var(--green)"}}>✓ Aktif — surat baru otomatis tercatat ke sheet</p>
              : <p className="hint" style={{marginTop:6}}>Nonaktif. Surat tetap tersimpan normal di perangkat ini tanpa fitur ini.</p>}
            {appsExpanded && (
              <div style={{marginTop:12}}>
                <p className="hint" style={{marginBottom:10,lineHeight:1.6}}>Supaya surat yang diterbitkan dari SIMORIS ikut tercatat otomatis di sheet, ikuti langkah berikut sekali saja:</p>
                <ol style={{fontSize:12.5,color:"var(--ink-700)",lineHeight:2,margin:"0 0 12px",paddingLeft:20}}>
                  <li>Buka Google Sheet Anda, klik menu <b>Extensions</b> → <b>Apps Script</b>.</li>
                  <li>Hapus tulisan yang ada, lalu tempel kode di bawah ini (klik "Salin Kode" dulu).</li>
                  <li>Klik <b>Deploy</b> (kanan atas) → <b>New deployment</b>.</li>
                  <li>Klik ikon gerigi ⚙️ di samping "Select type" → pilih <b>Web app</b>.</li>
                  <li>Pada "Who has access", pilih <b>Anyone</b> → klik <b>Deploy</b> → izinkan akses jika diminta.</li>
                  <li>Salin <b>URL Web app</b> yang muncul → tempel di kolom di bawah → Simpan.</li>
                </ol>
                <div style={{position:"relative"}}>
                  <textarea className="code-snippet" readOnly rows={9} value={APPS_SCRIPT_SNIPPET} onClick={function(e){ e.target.select(); }}/>
                  <button className="btn btn-ghost" onClick={copySnippet} style={{position:"absolute",top:8,right:8,padding:"6px 10px",fontSize:11.5}}>{copied ? "Tersalin ✓" : "Salin Kode"}</button>
                </div>
                <div className="field" style={{marginTop:10}}><label>URL Web App Apps Script</label><input type="text" placeholder="https://script.google.com/macros/s/XXXXX/exec" value={appsUrl} onChange={function(e){ setAppsUrl(e.target.value); }}/></div>
                {appsErr && <p className="error-text" style={{marginTop:8}}>{appsErr}</p>}
                <p className="hint" style={{marginTop:8}}>Catatan: hanya surat <b>baru</b> dari SIMORIS yang dikirim ke sheet. Kalau URL ini diisi, nomor surat akan diminta dari sheet (lebih aman kalau dipakai banyak perangkat sekaligus) — kalau sheet tidak terjangkau, SIMORIS otomatis memakai nomor lokal sebagai cadangan.</p>
                <button className="btn-dark" onClick={saveAppsUrl} style={{width:"100%",marginTop:10,padding:10,borderRadius:8}}>Simpan URL Tulis-Balik</button>
              </div>
            )}
          </div>

          <div style={{borderTop:"1px solid var(--ink-100)",paddingTop:14}}>
            <p className="hint" style={{marginBottom:8,fontWeight:700,color:"var(--red)",textTransform:"uppercase",fontSize:11}}>Zona Bahaya</p>
            <div className="danger-zone">
              <p style={{fontSize:12.5,color:"var(--ink-600)",margin:"0 0 10px",lineHeight:1.5}}>Menghapus SEMUA data surat ({S.surats.length} surat) secara permanen dari perangkat ini. Kode klasifikasi dan pengaturan tidak ikut terhapus.</p>
              <button onClick={onOpenHapusSemua} style={{width:"100%",padding:10,borderRadius:8,fontWeight:700,cursor:"pointer",background:"var(--red)",color:"#fff",border:"none"}}>Hapus Semua Data Surat</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================== APP ============================== */

function App(){
  const [authed, setAuthed] = useState(isoAuthedInit);
  const [S, setS] = useState(loadState);
  const sRef = useRef(S);
  useEffect(function(){ sRef.current = S; }, [S]);
  useEffect(function(){ saveState(S); }, [S]);

  function mutateS(mutator){
    setS(function(prev){ const next = cloneState(prev); mutator(next); return next; });
  }

  const [search, setSearch] = useState("");
  const [kodeFilter, setKodeFilter] = useState("");
  const [page, setPage] = useState(1);
  const [pageSize, setPageSize] = useState(50);

  const [modal, setModal] = useState(null); // 'surat' | 'kelola' | 'detail' | 'confirm' | 'notice' | 'hapusSemua'
  const [editingId, setEditingId] = useState(null);
  const [detailId, setDetailId] = useState(null);
  const [confirmMsg, setConfirmMsg] = useState("");
  const [confirmAction, setConfirmAction] = useState(null);
  const [noticeTitle, setNoticeTitle] = useState("");
  const [noticeMsg, setNoticeMsg] = useState("");
  const [downloadMenuOpen, setDownloadMenuOpen] = useState(false);
  const [refreshing, setRefreshing] = useState(false);
  const [submittingSurat, setSubmittingSurat] = useState(false);
  const [toast, setToast] = useState("");
  const toastTimer = useRef(null);
  const fileInputRef = useRef(null);

  function showToast(msg){
    setToast(msg);
    if(toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(function(){ setToast(""); }, 2600);
  }
  function showNotice(title, msg){ setNoticeTitle(title||"Pemberitahuan"); setNoticeMsg(msg); setModal("notice"); }
  function showConfirm(msg, onYes){ setConfirmMsg(msg); setConfirmAction(function(){ return onYes; }); setModal("confirm"); }
  function closeModal(){ setModal(null); }

  const filtered = useMemo(function(){
    const sorted = S.surats; // sudah dijaga terurut menurun oleh mutateS
    if(!search && !kodeFilter) return sorted;
    const s = search.toLowerCase();
    return sorted.filter(function(x){
      let matchSearch = true;
      if(s){
        const hay = (x.perihal+" "+x.tujuan+" "+displayNomor(S,x)).toLowerCase();
        matchSearch = hay.indexOf(s) > -1;
      }
      const matchKode = !kodeFilter || String(x.kodeId) === kodeFilter;
      return matchSearch && matchKode;
    });
  }, [S, search, kodeFilter]);

  const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
  const safePage = Math.min(Math.max(1, page), totalPages);
  useEffect(function(){ if(page !== safePage) setPage(safePage); }, [safePage]);
  const start = (safePage-1) * pageSize;
  const rows = filtered.slice(start, start+pageSize);

  const editingSurat = editingId ? S.surats.find(function(x){ return x.id===editingId; }) : null;
  const detailSurat = detailId ? S.surats.find(function(x){ return x.id===detailId; }) : null;

  /* ---------- Surat CRUD ---------- */

  function openTambah(){ setEditingId(null); setModal("surat"); }
  function openEdit(id){ setEditingId(id); setModal("surat"); }
  function closeSuratModal(){ setModal(null); setEditingId(null); }

  function finalizeNewSurat(urutOrNull, kodeId, nomorOverride, tujuan, perihal, tanggal, dibuatOleh, customMsg){
    let msg = customMsg;
    mutateS(function(draft){
      let finalUrut = urutOrNull;
      if(finalUrut == null){ draft.counter += 1; finalUrut = draft.counter; }
      else if(finalUrut > draft.counter){ draft.counter = finalUrut; }
      const nomorText = nomorOverride || nomorSurat(draft, finalUrut, kodeId);
      draft.surats.unshift({ id:uid(), urut:finalUrut, kodeId:kodeId, tujuan:tujuan, perihal:perihal, tanggal:tanggal, dibuatOleh:dibuatOleh, sumber:"manual", nomorOverride: nomorOverride||null });
      draft.surats.sort(function(a,b){ return b.urut-a.urut; });
      if(!msg) msg = "Nomor "+nomorText+" berhasil diterbitkan.";
    });
    setModal(null); setEditingId(null); setPage(1);
    showToast(msg);
  }

  async function handleSubmitSurat(values){
    if(editingId){
      mutateS(function(draft){
        const s = draft.surats.find(function(x){ return x.id===editingId; });
        if(s){ s.kodeId=values.kodeId; s.tanggal=values.tanggal; s.tujuan=values.tujuan; s.perihal=values.perihal; s.dibuatOleh=values.dibuatOleh; }
      });
      setModal(null); setEditingId(null);
      showToast("Perubahan tersimpan.");
      return;
    }
    const current = sRef.current;
    const kodeObjForPush = kodeOf(current, values.kodeId);
    const appsUrl = (current.settings.appsScriptUrl||"").trim();
    if(appsUrl && kodeObjForPush){
      setSubmittingSurat(true);
      const hasil = await requestNomorFromSheet(current, kodeObjForPush.kode, values.tujuan, values.tanggal, values.perihal);
      setSubmittingSurat(false);
      if(hasil.ok){
        finalizeNewSurat(hasil.urut, values.kodeId, hasil.nomor, values.tujuan, values.perihal, values.tanggal, values.dibuatOleh,
          "Nomor "+hasil.nomor+" berhasil diterbitkan & tersinkron ke sheet.");
      } else {
        finalizeNewSurat(null, values.kodeId, null, values.tujuan, values.perihal, values.tanggal, values.dibuatOleh,
          "Nomor diterbitkan secara lokal (gagal terhubung ke sheet). Sinkronkan manual nanti.");
      }
    } else {
      finalizeNewSurat(null, values.kodeId, null, values.tujuan, values.perihal, values.tanggal, values.dibuatOleh);
    }
  }

  function handleDelete(s){
    showConfirm('Hapus surat "'+displayNomor(sRef.current, s)+'"? Tindakan ini tidak dapat dibatalkan.', function(){
      mutateS(function(draft){ draft.surats = draft.surats.filter(function(x){ return x.id!==s.id; }); });
      setModal(null);
      showToast("Surat dihapus.");
    });
  }

  function openDetail(id){ setDetailId(id); setModal("detail"); }
  function closeDetail(){ setModal(null); setDetailId(null); }

  /* ---------- Ekspor / cetak ---------- */

  function doExportExcel(){ if(!exportExcelFile(sRef.current, filtered)) showNotice("Pustaka Belum Siap","Pustaka Excel belum siap dimuat. Periksa koneksi internet Anda lalu muat ulang halaman."); }
  function doExportCsv(){ exportCsvFile(sRef.current, filtered); }
  function doExportPdf(){ if(!exportPdfFile(sRef.current, filtered)) showNotice("Pustaka Belum Siap","Pustaka PDF belum siap dimuat. Periksa koneksi internet Anda lalu muat ulang halaman."); }
  function doPrint(){ window.print(); }
  function doBackupJson(){ exportJsonBackup(sRef.current); }

  /* ---------- Impor ---------- */

  function handleFileChange(e){
    const file = e.target.files[0];
    if(!file){ return; }
    const name = file.name.toLowerCase();
    if(/\.(xlsx|xls)$/.test(name)){
      const reader = new FileReader();
      reader.onload = function(ev){ handleImportedExcel(ev.target.result); };
      reader.readAsArrayBuffer(file);
    } else {
      const reader = new FileReader();
      reader.onload = function(ev){ handleImportedText(ev.target.result, file.name); };
      reader.readAsText(file, "UTF-8");
    }
    e.target.value = "";
  }

  function handleImportedText(text, filename){
    const isJson = /\.json$/i.test(filename) || /^\s*\{/.test(text);
    if(isJson) importJsonBackup(text);
    else importRowsLegacy(parseCsv(text));
  }
  function handleImportedExcel(buf){
    if(typeof XLSX === "undefined"){ showNotice("Pustaka Belum Siap","Pustaka pembaca Excel belum siap dimuat. Periksa koneksi internet Anda lalu muat ulang halaman."); return; }
    let wb;
    try{ wb = XLSX.read(buf, { type:"array", cellDates:true }); }
    catch(e){ showNotice("File Tidak Terbaca","File Excel tidak dapat dibaca. Pastikan file berformat .xlsx atau .xls yang valid."); return; }
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, { header:1, raw:true, defval:"" });
    const rows = raw.map(function(r){ return r.map(excelCellToStr); }).filter(function(r){ return r.some(function(c){ return String(c).trim()!==""; }); });
    importRowsLegacy(rows);
  }
  function importJsonBackup(text){
    let data;
    try{ data = JSON.parse(text); }catch(e){ showNotice("File Tidak Valid","File JSON tidak valid."); return; }
    if(!data || !Array.isArray(data.surats) || !Array.isArray(data.kodeList)){
      showNotice("Format Tidak Dikenali",'Struktur file JSON tidak dikenali. Gunakan file hasil tombol "Cadangkan".'); return;
    }
    showConfirm("Menimpa seluruh data saat ini ("+sRef.current.surats.length+" surat) dengan isi file cadangan ("+data.surats.length+" surat)?", function(){
      if(!data.settings) data.settings = { instansiKode:"W.9", digit:3, googleSheetUrl:"", appsScriptUrl:"" };
      data.surats.sort(function(a,b){ return b.urut-a.urut; });
      setS(data);
      setPage(1);
      setModal(null);
      showToast("Data berhasil dipulihkan dari cadangan.");
    });
  }
  function importRowsLegacy(rows){
    if(rows.length < 2){ showNotice("File Kosong","File kosong atau tidak terbaca."); return; }
    const cols = detectColumns(rows);
    if(cols.idxPerihal === -1){ showNotice("Format Tidak Dikenali",'Kolom "Perihal" tidak ditemukan. Pastikan file memiliki kolom Perihal seperti pada format spreadsheet sebelumnya.'); return; }
    const parsedRows = parseRowsToSurats(rows, cols);
    let summary = null;
    mutateS(function(draft){ summary = applyImportToDraft(draft, parsedRows); });
    setPage(1);
    showToast(summary.ditambahkan+" surat diimpor"+(summary.dilewati?", "+summary.dilewati+" dilewati (sudah ada)":"")+".");
  }

  /* ---------- Google Sheet ---------- */

  function syncFromGoogleSheetRows(rows){
    if(rows.length < 2){ showNotice("Sheet Kosong","Sheet tidak berisi data yang bisa disinkronkan."); return; }
    const cols = detectColumns(rows);
    if(cols.idxPerihal === -1){ showNotice("Format Tidak Dikenali",'Kolom "Perihal" tidak ditemukan di sheet ini. Pastikan sheet memiliki kolom Perihal seperti pada format spreadsheet sebelumnya.'); return; }
    const parsedRows = parseRowsToSurats(rows, cols);
    if(!parsedRows.length){
      const hadBefore = sRef.current.surats.some(function(s){ return s.sumber==="sheet"; });
      if(hadBefore){
        showNotice("Refresh Dibatalkan",'Sheet tampak kosong (tidak ada baris data yang valid). Untuk mencegah kehilangan data, refresh dibatalkan dan data sebelumnya TIDAK diubah.\n\nJika sheet memang sengaja dikosongkan, hapus manual lewat "Hapus Semua Data" di Kelola Kode.');
        return;
      }
    }
    mutateS(function(draft){
      let posCounter=0, maxUrutSheet=0;
      const fresh = parsedRows.map(function(pr){
        posCounter++;
        const tanggal = parseTanggalIndo(pr.tanggalRaw) || isoToday(0);
        let kodeObj=null, urut=null;
        const parsed = parseNomorRaw(pr.nomorRaw);
        if(parsed){ urut=parsed.urut; kodeObj=ensureKodeInDraft(draft, parsed.kodeStr); }
        if(!kodeObj && pr.kodeExplicit) kodeObj = ensureKodeInDraft(draft, pr.kodeExplicit);
        if(!kodeObj) kodeObj = ensureKodeInDraft(draft, "SHEET");
        if(urut===null) urut = posCounter;
        if(urut>maxUrutSheet) maxUrutSheet=urut;
        return { id: uid()+posCounter, urut:urut, kodeId:kodeObj.id, tujuan:pr.tujuan, perihal:pr.perihal, tanggal:tanggal, dibuatOleh:"", sumber:"sheet", nomorOverride: pr.nomorRaw||null };
      });
      if(maxUrutSheet > draft.counter) draft.counter = maxUrutSheet;
      draft.surats = draft.surats.filter(function(s){ return s.sumber!=="sheet"; }).concat(fresh);
      draft.surats.sort(function(a,b){ return b.urut-a.urut; });
    });
    setPage(1);
    showToast("Sinkron selesai — "+parsedRows.length+" surat dari Google Sheet.");
  }

  async function handleRefreshSheet(overrideUrl){
    const raw = (overrideUrl != null ? overrideUrl : (sRef.current.settings.googleSheetUrl||"")).trim();
    if(!raw){
      showNotice("Tautan Belum Diatur",'Tautan Google Sheet belum diatur.\n\nBuka "Kelola Kode" → bagian "Sumber data Google Sheet" untuk mengaturnya terlebih dahulu.');
      setModal("kelola");
      return;
    }
    const candidates = buildCandidateCsvUrls(raw);
    if(!candidates.length){ showNotice("Tautan Tidak Dikenali",'Tautan Google Sheet tidak dikenali.\n\nTempel tautan "Bagikan" biasa dari Google Sheets, contoh:\nhttps://docs.google.com/spreadsheets/d/XXXXXXXX/edit'); return; }
    setRefreshing(true);
    try{
      const text = await tryFetchCsv(candidates, 15000);
      syncFromGoogleSheetRows(parseCsv(text));
    }catch(err){
      const isTimeout = err && err.name === "AbortError";
      showNotice("Gagal Refresh",'Gagal mengambil data dari Google Sheet'+(isTimeout?' (waktu tunggu habis, koneksi terlalu lambat)':'')+'.\n\n'+
        'Kemungkinan penyebab:\n'+
        '1. Sheet belum dibagikan sebagai "Siapa saja yang memiliki tautan → Dapat melihat" (klik Bagikan di Google Sheets, lalu ubah akses umum).\n'+
        '2. Tautan yang ditempel salah, sudah tidak berlaku, atau bukan tautan Google Sheets.\n'+
        '3. Perangkat ini sedang tidak terhubung ke internet.\n\n'+
        'Detail teknis: '+(err && err.message ? err.message : String(err)));
    }finally{
      setRefreshing(false);
    }
  }

  /* ---------- Hapus semua ---------- */

  function confirmHapusSemua(){
    mutateS(function(draft){ draft.surats = []; draft.counter = 0; });
    setModal(null);
    showToast("Semua data surat telah dihapus.");
  }

  /* ---------- Logout ---------- */

  function handleLogout(){
    showConfirm("Keluar dari SIMORIS? Anda perlu memasukkan kata sandi lagi untuk membuka kembali.", function(){
      setAuthedStorage(false);
      setAuthed(false);
      setModal(null);
    });
  }

  if(!authed) return <LoginScreen onSuccess={function(){ setAuthed(true); }}/>;

  const paginationProps = {
    page: safePage, totalPages: totalPages, total: filtered.length, pageSize: pageSize, start: start,
    onPrev: function(){ setPage(Math.max(1, safePage-1)); },
    onNext: function(){ setPage(safePage+1); },
    onPage: function(n){ setPage(n); },
    onPageSize: function(n){ setPageSize(n); setPage(1); }
  };

  return (
    <div className="paper-texture" style={{minHeight:"100vh"}}>
      <Header count={S.surats.length} onKelola={function(){ setModal("kelola"); }} onTambah={openTambah} onLogout={handleLogout}/>
      <main className="wrap">
        <Toolbar
          search={search} onSearch={function(v){ setSearch(v); setPage(1); }}
          kodeFilter={kodeFilter} onKodeFilter={function(v){ setKodeFilter(v); setPage(1); }}
          aktifKodeList={aktifKode(S)}
          onRefreshSheet={function(){ handleRefreshSheet(); }} refreshing={refreshing}
          onImportClick={function(){ fileInputRef.current && fileInputRef.current.click(); }}
          fileInputRef={fileInputRef} onFileChange={handleFileChange}
          downloadMenuOpen={downloadMenuOpen} setDownloadMenuOpen={setDownloadMenuOpen}
          onExportExcel={doExportExcel} onExportCsv={doExportCsv} onExportPdf={doExportPdf} onPrint={doPrint} onBackupJson={doBackupJson}
        />
        <Banner/>
        <SuratTable
          S={S} rows={rows} pageInfo={{ total: filtered.length }}
          onRowClick={openDetail} onEdit={openEdit} onDelete={handleDelete}
          paginationProps={paginationProps}
        />
      </main>

      <SuratModal open={modal==="surat"} editing={editingSurat} S={S} onClose={closeSuratModal} onSubmit={handleSubmitSurat} submitting={submittingSurat}/>
      <KelolaModal
        open={modal==="kelola"} S={S} onClose={function(){ setModal(null); }} mutateS={mutateS}
        showToast={showToast} showNotice={showNotice} showConfirm={showConfirm}
        onOpenHapusSemua={function(){ setModal("hapusSemua"); }}
        onTestRefresh={function(url){ handleRefreshSheet(url); }}
      />
      <DetailModal open={modal==="detail"} surat={detailSurat} S={S} onClose={closeDetail} onEdit={function(id){ setEditingId(id); setModal("surat"); }}/>
      <ConfirmModal open={modal==="confirm"} message={confirmMsg} onYes={function(){ setModal(null); if(confirmAction) confirmAction(); }} onNo={function(){ setModal(null); setConfirmAction(null); }}/>
      <NoticeModal open={modal==="notice"} title={noticeTitle} message={noticeMsg} onClose={function(){ setModal(null); }}/>
      <HapusSemuaModal open={modal==="hapusSemua"} count={S.surats.length} onClose={function(){ setModal(null); }} onConfirm={confirmHapusSemua}/>

      <Toast message={toast}/>
      <footer className="app-footer">SIMORIS · data tersimpan di peramban perangkat ini<br/>Dibuat oleh IT Pokja SDM</footer>
    </div>
  );
}

function isoAuthedInit(){ return isAuthedStorage(); }

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
