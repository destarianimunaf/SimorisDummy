<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIMORIS — Sistem Penomoran Surat Otomatis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink-900:#14264a; --ink-800:#1a3157; --ink-600:#2c4c7c; --ink-400:#5b729c;
    --ink-100:#e3e9f2; --ink-50:#f3f6fa; --segel:#c98a2e; --paper:#f8f6f1;
    --red:#b3413a; --red-bg:#fbe9e7; --green:#2f7d5c; --green-bg:#e3f3ea;
    --amber-bg:#fbeed4; --violet:#6a4c93; --violet-bg:#ece5f5; --blue-bg:#e3e9f2;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--paper); color:var(--ink-900);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:14px;
  }
  .mono{ font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace; }
  header.app-header{ background:var(--ink-900); color:#fff; }
  .wrap{ max-width:1080px; margin:0 auto; padding:0 24px; }
  .header-inner{ display:flex; align-items:center; justify-content:space-between; gap:16px; padding:20px 0; flex-wrap:wrap; }
  .brand{ display:flex; align-items:center; gap:14px; }
  .brand-mark{ width:42px; height:42px; border-radius:10px; background:rgba(201,138,46,.92);
    border:1.5px dashed rgba(255,255,255,.45); display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:15px; color:var(--ink-900); }
  .brand h1{ font-size:17px; margin:0; font-weight:800; letter-spacing:.2px; }
  .brand p{ margin:2px 0 0; font-size:12px; color:rgba(255,255,255,.7); }
  .header-actions{ display:flex; align-items:center; gap:18px; }
  .count-box{ text-align:right; }
  .count-box p{ margin:0; font-size:11px; color:rgba(255,255,255,.65); }
  .count-box strong{ font-size:20px; font-weight:700; }
  .btn{ border:none; cursor:pointer; font-weight:600; font-size:13px; border-radius:8px; padding:10px 16px;
    display:inline-flex; align-items:center; gap:6px; }
  .btn-segel{ background:var(--segel); color:var(--ink-900); }
  .btn-segel:hover{ background:#b87c26; }
  .btn-ghost{ background:#fff; color:var(--ink-800); border:1px solid var(--ink-100); }
  .btn-ghost:hover{ background:var(--ink-50); }
  .btn-dark{ background:var(--ink-900); color:#fff; }
  .btn-dark:hover{ background:var(--ink-800); }
  .btn-danger-text{ background:none; color:var(--red); font-weight:600; font-size:12px; padding:4px 6px; }
  main{ padding:28px 0 60px; }
  .toolbar{ display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .toolbar input[type=text], .toolbar select{
    padding:10px 12px; border-radius:8px; border:1px solid var(--ink-100); font-size:13px; background:#fff;
    font-family:inherit;
  }
  .toolbar .search{ flex:1; min-width:220px; position:relative; }
  .toolbar .search input{ width:100%; padding-left:34px; }
  .toolbar .search svg{ position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--ink-400); }
  .toolbar select{ min-width:220px; }
  .toolbar-right{ display:flex; gap:8px; margin-left:auto; }
  .card{ background:#fff; border:1px solid var(--ink-100); border-radius:12px; box-shadow:0 1px 2px rgba(20,38,74,.06),0 8px 24px -12px rgba(20,38,74,.18); overflow:hidden; }
  table{ width:100%; border-collapse:collapse; }
  thead tr{ background:var(--ink-50); }
  th{ text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--ink-600); font-weight:700; padding:11px 14px; }
  td{ padding:11px 14px; font-size:13px; border-top:1px solid var(--ink-100); vertical-align:middle; }
  tbody tr:hover{ background:#faf9f6; }
  .nomor-badge{ font-weight:700; background:var(--paper); border:1.5px dashed rgba(201,138,46,.55); border-radius:6px; padding:4px 9px; display:inline-block; }
  .badge{ display:inline-flex; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:700; white-space:nowrap; }
  .truncate{ max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .empty{ padding:48px 20px; text-align:center; }
  .empty p:first-child{ font-weight:700; margin:0 0 4px; }
  .empty p:last-child{ color:var(--ink-400); font-size:13px; margin:0; }
  .overlay{ position:fixed; inset:0; background:rgba(20,38,74,.5); backdrop-filter:blur(2px); display:flex; align-items:center; justify-content:center; padding:16px; z-index:50; }
  .modal{ background:#fff; border-radius:16px; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(20,38,74,.35); }
  .modal-head{ padding:18px 22px; border-bottom:1px solid var(--ink-100); display:flex; justify-content:space-between; align-items:center; }
  .modal-head h2{ margin:0; font-size:15px; font-weight:800; }
  .modal-close{ border:none; background:none; font-size:22px; line-height:1; color:var(--ink-400); cursor:pointer; }
  .modal-body{ padding:22px; display:flex; flex-direction:column; gap:14px; }
  .field label{ display:block; font-size:11px; font-weight:700; color:var(--ink-600); margin-bottom:5px; text-transform:uppercase; letter-spacing:.02em; }
  .field input, .field select{ width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--ink-100); font-size:13px; font-family:inherit; }
  .field input:focus, .field select:focus{ outline:none; border-color:var(--ink-600); box-shadow:0 0 0 3px rgba(44,76,124,.12); }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .preview-box{ background:var(--paper); border:1.5px dashed rgba(201,138,46,.55); border-radius:8px; padding:10px 14px; display:flex; justify-content:space-between; align-items:center; }
  .preview-box span:first-child{ font-size:11px; color:var(--ink-600); font-weight:600; }
  .preview-box span:last-child{ font-weight:700; }
  .form-actions{ display:flex; gap:10px; margin-top:4px; }
  .form-actions button{ flex:1; padding:11px; border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; }
  .error-text{ color:var(--red); font-size:12px; font-weight:600; margin:0; }
  .kode-row{ display:flex; justify-content:space-between; align-items:center; background:var(--paper); border-radius:8px; padding:8px 12px; font-size:13px; }
  .kode-row + .kode-row{ margin-top:6px; }
  .kode-row b{ font-family:inherit; }
  .hint{ color:var(--ink-400); font-size:11px; margin:0; }
  .toast{ position:fixed; bottom:22px; right:22px; background:var(--ink-900); color:#fff; padding:12px 16px; border-radius:10px; font-size:13px; font-weight:600; box-shadow:0 10px 30px rgba(20,38,74,.35); z-index:60; }
  .settings-row{ display:flex; gap:10px; }
  .badge-blue{ background:var(--blue-bg); color:var(--ink-800); }
  .badge-green{ background:var(--green-bg); color:var(--green); }
  .badge-emerald{ background:#e3f3ea; color:#1f6b46; }
  .badge-amber{ background:var(--amber-bg); color:#9a6316; }
  .badge-violet{ background:var(--violet-bg); color:var(--violet); }
  .badge-red{ background:var(--red-bg); color:var(--red); }
  .badge-slate{ background:#eef1f5; color:#475569; }
  footer.app-footer{ text-align:center; padding:24px; color:var(--ink-400); font-size:12px; line-height:1.8; }
  .banner{ background:#fff8ec; border:1px solid #f0dbb0; color:#8a5a12; font-size:12px; padding:10px 14px; border-radius:10px; margin-bottom:16px; line-height:1.5; }
  .visually-hidden{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; }

  /* ---- kartu untuk tampilan ponsel (pengganti tabel) ---- */
  .table-mobile{ display:none; }
  .surat-card{ background:#fff; border:1px solid var(--ink-100); border-radius:12px; padding:14px; margin-bottom:10px; }
  .surat-card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px; }
  .surat-card .nomor-badge{ font-size:12.5px; }
  .surat-card-perihal{ font-weight:700; font-size:13.5px; margin:0 0 4px; line-height:1.35; }
  .surat-card-meta{ color:var(--ink-600); font-size:12.5px; margin:0 0 2px; }
  .surat-card-actions{ display:flex; gap:14px; margin-top:10px; padding-top:10px; border-top:1px solid var(--ink-100); }
  .surat-card-actions button{ font-size:12.5px; font-weight:700; }

  .row-clickable{ cursor:pointer; }
  .surat-card.row-clickable:active{ background:var(--paper); }
  tbody tr.row-clickable:hover .nomor-badge{ border-color:var(--segel); }

  .detail-hero{ text-align:center; padding:2px 0 6px; }
  .detail-hero .nomor-badge{ font-size:16px; padding:7px 14px; }
  .detail-grid{ display:flex; flex-direction:column; gap:10px; }
  .detail-row{ display:flex; flex-direction:column; gap:3px; padding:10px 12px; background:var(--paper); border-radius:8px; }
  .detail-label{ font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; color:var(--ink-600); }
  .detail-value{ font-size:14px; color:var(--ink-900); word-break:break-word; line-height:1.4; }

  .pagination{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 14px; flex-wrap:wrap; }
  .pagination-info{ color:var(--ink-600); font-size:12.5px; }
  .pagination-controls{ display:flex; align-items:center; gap:6px; }
  .page-btn{ border:1px solid var(--ink-100); background:#fff; color:var(--ink-800); font-weight:600; font-size:12.5px;
    padding:7px 11px; border-radius:7px; cursor:pointer; min-width:34px; }
  .page-btn:hover:not(:disabled){ background:var(--ink-50); }
  .page-btn:disabled{ opacity:.4; cursor:not-allowed; }
  .page-btn.active{ background:var(--ink-900); color:#fff; border-color:var(--ink-900); }
  .page-jump{ display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--ink-600); }
  .page-jump input{ width:52px; padding:6px 8px; border-radius:7px; border:1px solid var(--ink-100); font-size:12.5px; text-align:center; }
  .page-size-select{ padding:7px 9px; border-radius:7px; border:1px solid var(--ink-100); font-size:12.5px; background:#fff; }

  @media (max-width:760px){
    .pagination{ flex-direction:column; align-items:stretch; text-align:center; }
    .pagination-controls{ justify-content:center; flex-wrap:wrap; }
  }

  .login-wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .login-card{ background:#fff; border-radius:16px; width:100%; max-width:380px; padding:32px 28px; box-shadow:0 20px 60px rgba(20,38,74,.18); border:1px solid var(--ink-100); }
  .login-brand{ display:flex; flex-direction:column; align-items:center; text-align:center; margin-bottom:24px; }
  .login-brand .brand-mark{ background:rgba(201,138,46,.92); border:1.5px dashed rgba(201,138,46,.55); color:var(--ink-900); margin-bottom:12px; }
  .login-brand h1{ font-size:18px; margin:0; font-weight:800; color:var(--ink-900); }
  .login-brand p{ margin:4px 0 0; font-size:12.5px; color:var(--ink-400); }
  .login-card .field{ margin-bottom:16px; }
  .login-card button[type=submit]{ width:100%; padding:12px; border-radius:8px; font-weight:700; font-size:13.5px; cursor:pointer; }

  .danger-zone{ border:1px solid rgba(179,65,58,.35); background:#fef4f3; border-radius:10px; padding:14px; }
  .code-snippet{ width:100%; font-family:var(--font-mono); font-size:11px; line-height:1.5; padding:10px; border-radius:8px; border:1px solid var(--ink-100); background:var(--paper); resize:vertical; color:var(--ink-800); }

  @media (max-width:760px){
    .wrap{ padding:0 16px; }
    body{ font-size:13.5px; }
    .header-inner{ padding:16px 0; gap:12px; }
    .brand h1{ font-size:16px; }
    .header-actions{ width:100%; justify-content:space-between; gap:10px; }
    .count-box{ display:none; }
    #btnKelola{ padding:9px 12px; font-size:12.5px; }
    #btnTambah{ flex:1; justify-content:center; }
    .toolbar{ gap:8px; }
    .toolbar select{ min-width:0; width:100%; }
    .toolbar-right{ margin-left:0; width:100%; gap:8px; flex-wrap:wrap; }
    .toolbar-right .btn{ flex:1 1 calc(50% - 4px); justify-content:center; padding:9px 8px; font-size:12px; white-space:nowrap; }
    .grid2{ grid-template-columns:1fr; }
    .modal{ max-width:100%; border-radius:14px 14px 0 0; align-self:flex-end; }
    .overlay{ align-items:flex-end; padding:0; }
    .modal-body{ padding:18px; }
    .table-desktop{ display:none; }
    .table-mobile{ display:block; }
  }
  @media print{
    header, .toolbar, .btn, .empty p:last-child{ display:none !important; }
    body{ background:#fff; }
    .card{ box-shadow:none; border:none; }
    .table-mobile{ display:none !important; }
    .table-desktop{ display:block !important; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  "use strict";

  var STORE_KEY = "simoris_data_v1";
  var AUTH_KEY = "simoris_authed_v1";
  var PW_HASH_KEY = "simoris_pw_hash_v1";
  // Hash dari kata sandi bawaan "simoris2026" — GANTI setelah login pertama
  // lewat "Kelola Kode" → "Ubah kata sandi akses".
  var DEFAULT_PW_HASH = "ca861d55";

  // Hash sederhana (djb2), BUKAN kriptografi kuat — ini hanya gerbang akses
  // dasar agar orang tidak sembarangan membuka aplikasi, bukan proteksi
  // untuk data sangat rahasia (aplikasi ini 100% berjalan di peramban,
  // sehingga siapa pun yang punya akses fisik + alat developer browser
  // pada akhirnya tetap bisa melihat data yang tersimpan).
  function simpleHash(str){
    var hash = 5381;
    for(var i=0;i<str.length;i++){
      hash = ((hash << 5) + hash + str.charCodeAt(i)) >>> 0;
    }
    return hash.toString(16);
  }
  function getStoredPwHash(){
    try{ return localStorage.getItem(PW_HASH_KEY) || DEFAULT_PW_HASH; }catch(e){ return DEFAULT_PW_HASH; }
  }
  function setStoredPwHash(hash){
    try{ localStorage.setItem(PW_HASH_KEY, hash); }catch(e){ /* storage unavailable */ }
  }
  function isAuthed(){
    try{ return localStorage.getItem(AUTH_KEY) === "1"; }catch(e){ return false; }
  }
  function setAuthed(v){
    try{ localStorage.setItem(AUTH_KEY, v ? "1" : "0"); }catch(e){ /* storage unavailable */ }
  }

  var WARNA_CLASS = {
    blue:"badge-blue", green:"badge-green", emerald:"badge-emerald",
    amber:"badge-amber", violet:"badge-violet", red:"badge-red", slate:"badge-slate"
  };

  // Klasifikasi sengaja dibuat MINIMAL secara bawaan — hanya 1 kode contoh.
  // Kode klasifikasi ditambahkan secara manual lewat "Kelola Kode" sesuai
  // kebutuhan kantor masing-masing. Yang otomatis hanyalah deret nomor
  // urut di belakang (mis. ...-001, ...-002, dst).
  // Kode Google Apps Script siap-tempel supaya surat yang diterbitkan dari
  // SIMORIS bisa ikut tercatat otomatis di Google Sheet (fitur tulis-balik,
  // opsional). Ditampilkan di panel "Kelola Kode" untuk disalin pengguna.
  var APPS_SCRIPT_SNIPPET =
    'function doGet(e) {\n' +
    '  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheets()[0];\n' +
    '  var p = e.parameter;\n' +
    '  sheet.appendRow([\n' +
    '    sheet.getLastRow(),   // NO — sesuaikan urutan kolom kalau beda\n' +
    '    p.tujuan  || "",      // TUJUAN SURAT\n' +
    '    p.tanggal || "",      // TANGGAL SURAT\n' +
    '    p.perihal || "",      // PERIHAL\n' +
    '    p.nomor   || ""       // NOMOR SURAT KELUAR / SURAT PERINTAH\n' +
    '  ]);\n' +
    '  return ContentService.createTextOutput("OK");\n' +
    '}';

  var DEFAULT_KODE = [
    { id:1, kode:"UM", nama:"Umum", warna:"emerald", aktif:true }
  ];

  function defaultState(){
    return {
      settings: { instansiKode:"W.9", digit:3, googleSheetUrl:"", appsScriptUrl:"" },
      counter: 2,
      kodeList: DEFAULT_KODE,
      surats: [
        { id:1, urut:1, kodeId:1, tujuan:"Rizani", perihal:"Surat Undangan Rapat Koordinasi", tanggal:isoToday(-1), dibuatOleh:"" },
        { id:2, urut:2, kodeId:1, tujuan:"", perihal:"Pengadaan ATK Triwulan I", tanggal:isoToday(0), dibuatOleh:"" }
      ],
      seeded:true
    };
  }

  function isoToday(offsetDays){
    var d = new Date();
    d.setDate(d.getDate() + offsetDays);
    return d.toISOString().slice(0,10);
  }

  function load(){
    try{
      var raw = localStorage.getItem(STORE_KEY);
      if(!raw) { var s = defaultState(); save(s); return s; }
      return JSON.parse(raw);
    }catch(e){ return defaultState(); }
  }
  function save(s){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }catch(e){ /* storage unavailable */ }
  }

  var S = load();
  if(!S.settings) S.settings = { instansiKode:"W.9", digit:3, googleSheetUrl:"", appsScriptUrl:"" };
  if(typeof S.settings.googleSheetUrl === "undefined") S.settings.googleSheetUrl = "";
  if(typeof S.settings.appsScriptUrl === "undefined") S.settings.appsScriptUrl = "";
  resortSurats();
  var ui = { search:"", kodeFilter:"", modal:null, editingId:null, toast:"", formKodeId:null, detailId:null, page:1, pageSize:50, confirmMessage:"", confirmOnYes:null, noticeTitle:"", noticeMessage:"" };

  function kodeOf(id){
    for(var i=0;i<S.kodeList.length;i++){ if(S.kodeList[i].id===id) return S.kodeList[i]; }
    return null;
  }
  function aktifKode(){ return S.kodeList.filter(function(k){ return k.aktif; }); }
  function nomorSurat(urut, kodeId){
    var k = kodeOf(kodeId);
    var kodeStr = k ? k.kode : "?";
    var padded = String(urut).padStart(S.settings.digit, "0");
    return S.settings.instansiKode + "-" + kodeStr + "-" + padded;
  }
  // Nomor yang DITAMPILKAN: kalau berasal dari impor/sinkron Google Sheet
  // dan sudah ada teks nomor asli di sumbernya (nomorOverride), pakai teks
  // itu APA ADANYA — jangan direkonstruksi — supaya selalu identik dengan
  // yang tertulis di sumber datanya. Hanya surat yang diterbitkan langsung
  // dari SIMORIS yang nomornya dihitung otomatis dari kode+urut.
  function displayNomor(s){
    return s.nomorOverride || nomorSurat(s.urut, s.kodeId);
  }
  function fmtTanggal(iso){
    if(!iso) return "—";
    var d = new Date(iso+"T00:00:00");
    var bulan = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
    return d.getDate()+" "+bulan[d.getMonth()]+" "+d.getFullYear();
  }
  function uid(){ return Date.now() + Math.floor(Math.random()*1000); }
  function esc(str){
    return String(str==null?"":str).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  function resortSurats(){
    S.surats.sort(function(a,b){ return b.urut - a.urut; });
  }

  function filteredSurats(){
    // S.surats selalu dijaga terurut menurun (lihat resortSurats) sehingga
    // pencarian/filter tidak perlu mengurutkan ulang setiap kali diketik —
    // penting untuk performa saat data mencapai ribuan baris.
    if(!ui.search && !ui.kodeFilter) return S.surats;
    var searchLower = ui.search ? ui.search.toLowerCase() : "";
    return S.surats.filter(function(s){
      var matchSearch = true;
      if(searchLower){
        var hay = (s.perihal+" "+s.tujuan+" "+displayNomor(s)).toLowerCase();
        matchSearch = hay.indexOf(searchLower) > -1;
      }
      var matchKode = !ui.kodeFilter || String(s.kodeId) === ui.kodeFilter;
      return matchSearch && matchKode;
    });
  }

  function currentPage(){
    var all = filteredSurats();
    var totalPages = Math.max(1, Math.ceil(all.length / ui.pageSize));
    if(ui.page > totalPages) ui.page = totalPages;
    if(ui.page < 1) ui.page = 1;
    var start = (ui.page-1) * ui.pageSize;
    return {
      rows: all.slice(start, start + ui.pageSize),
      total: all.length,
      totalPages: totalPages,
      start: start
    };
  }

  function showToast(msg){
    ui.toast = msg;
    render();
    setTimeout(function(){ ui.toast=""; render(); }, 2600);
  }

  // ---------- render pieces ----------

  function renderHeader(){
    return ''+
    '<header class="app-header"><div class="wrap header-inner">'+
      '<div class="brand">'+
        '<div class="brand-mark">№</div>'+
        '<div><h1>SIMORIS</h1><p>Sistem Penomoran Surat Otomatis</p></div>'+
      '</div>'+
      '<div class="header-actions">'+
        '<div class="count-box"><p>Surat tercatat</p><strong class="mono">'+String(S.surats.length).padStart(3,"0")+'</strong></div>'+
        '<button class="btn btn-ghost" id="btnKelola" style="background:transparent;color:#fff;border-color:rgba(255,255,255,.25)">Kelola Kode</button>'+
        '<button class="btn btn-segel" id="btnTambah">+ Terbitkan Nomor</button>'+
        '<button class="btn btn-ghost" id="btnLogout" style="background:transparent;color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.25);padding:10px 12px" title="Keluar">Keluar</button>'+
      '</div>'+
    '</div></header>';
  }

  function renderToolbar(){

  function renderPagination(page){
    var from = page.total ? page.start+1 : 0;
    var to = Math.min(page.start+ui.pageSize, page.total);
    var pageBtns = "";
    var p = ui.page, tp = page.totalPages;
    // tampilkan maks 5 nomor halaman di sekitar halaman aktif, agar tetap
    // ringkas walau jumlah halaman sangat banyak (ratusan halaman untuk
    // data ribuan baris)
    var lo = Math.max(1, p-2), hi = Math.min(tp, p+2);
    if(p<=3) hi = Math.min(tp, 5);
    if(p>=tp-2) lo = Math.max(1, tp-4);
    if(lo>1) pageBtns += '<button class="page-btn" data-page="1">1</button>'+(lo>2?'<span style="padding:0 2px;color:var(--ink-400)">…</span>':'');
    for(var i=lo;i<=hi;i++){
      pageBtns += '<button class="page-btn'+(i===p?' active':'')+'" data-page="'+i+'">'+i+'</button>';
    }
    if(hi<tp) pageBtns += (hi<tp-1?'<span style="padding:0 2px;color:var(--ink-400)">…</span>':'')+'<button class="page-btn" data-page="'+tp+'">'+tp+'</button>';

    return '<div class="pagination">'+
      '<div class="pagination-info">Menampilkan <b>'+from+'–'+to+'</b> dari <b>'+page.total+'</b> surat</div>'+
      '<div class="pagination-controls">'+
        '<button class="page-btn js-prev-page"'+(p<=1?' disabled':'')+'>‹ Sebelumnya</button>'+
        pageBtns+
        '<button class="page-btn js-next-page"'+(p>=tp?' disabled':'')+'>Berikutnya ›</button>'+
      '</div>'+
      '<div class="pagination-controls">'+
        '<label class="page-jump">Per halaman '+
          '<select class="page-size-select js-page-size">'+
            [25,50,100,200,500].map(function(n){ return '<option value="'+n+'"'+(ui.pageSize===n?' selected':'')+'>'+n+'</option>'; }).join("")+
          '</select>'+
        '</label>'+
      '</div>'+
    '</div>';
  }

  function renderSuratModal(){
    if(ui.modal !== "surat") return "";
    var editing = ui.editingId ? S.surats.filter(function(s){return s.id===ui.editingId;})[0] : null;
    var kodeId = ui.formKodeId || (editing ? editing.kodeId : (aktifKode()[0] && aktifKode()[0].id));
    var previewUrut = editing ? editing.urut : (S.counter + 1);
    var preview;
    if(editing && !ui.formKodeId && editing.nomorOverride){
      preview = editing.nomorOverride;
    } else {
      preview = kodeId ? nomorSurat(previewUrut, kodeId) : "—";
    }
    var opsiKode = aktifKode();
    if(editing){
      var kodeEditing = kodeOf(editing.kodeId);
      if(kodeEditing && !kodeEditing.aktif){ opsiKode = opsiKode.concat([kodeEditing]); }
    }
    var opts = opsiKode.map(function(k){
      var label = esc(k.kode)+' — '+esc(k.nama)+(k.aktif?'':' (nonaktif)');
      return '<option value="'+k.id+'"'+(String(kodeId)===String(k.id)?" selected":"")+'>'+label+'</option>';

      '<div class="modal-head"><h2>'+(editing?"Ubah Surat":"Terbitkan Nomor Baru")+'</h2>'+

  function exportCsv(){
    var rows = filteredSurats();
    var header = ["No","Nomor Surat","Tanggal","Tujuan","Perihal","Kode Klasifikasi"];
    var lines = [header.join(",")];
    rows.forEach(function(s){
      var k = kodeOf(s.kodeId);
      var cells = [
        s.urut,
        displayNomor(s),
        fmtTanggal(s.tanggal),
        s.tujuan||"",
        s.perihal,
        k?k.kode:""
      ].map(function(c){
        var v = String(c).replace(/"/g,'""');
        return /[",\n]/.test(v) ? '"'+v+'"' : v;
      });
      lines.push(cells.join(","));
    });
    var blob = new Blob(["\uFEFF"+lines.join("\r\n")], { type:"text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "simoris-rekap-"+isoToday(0)+".csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  var BULAN_ID = {
    "januari":0,"februari":1,"maret":2,"april":3,"mei":4,"juni":5,
    "juli":6,"agustus":7,"september":8,"oktober":9,"november":10,"desember":11
  };

  function parseTanggalIndo(str){
    if(!str) return null;
    str = String(str).trim();

    // format ISO: 2026-01-06
    var iso = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if(iso) return iso[1]+"-"+pad2(iso[2])+"-"+pad2(iso[3]);

    // format dd/mm/yyyy atau dd-mm-yyyy
    var slash = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if(slash) return slash[3]+"-"+pad2(slash[1])+"-"+pad2(slash[2]);

    // format "6 Januari 2026"
    var indo = str.match(/^(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})$/);
    if(indo){
      var bulanIdx = BULAN_ID[indo[2].toLowerCase()];
      if(bulanIdx !== undefined) return indo[3]+"-"+pad2(bulanIdx+1)+"-"+pad2(indo[1]);
    }
    return null;
  }
  function pad2(n){ n = String(n); return n.length<2 ? "0"+n : n; }

  function parseCsv(text){
    // parser CSV sederhana yang menangani tanda kutip
    var rows = [];
    var i=0, field="", row=[], inQuotes=false;
    text = text.replace(/^\uFEFF/, "");
    while(i < text.length){
      var c = text[i];
      if(inQuotes){
        if(c === '"'){
          if(text[i+1] === '"'){ field += '"'; i+=2; continue; }
          inQuotes = false; i++; continue;
        }
        field += c; i++; continue;
      } else {
        if(c === '"'){ inQuotes = true; i++; continue; }
        if(c === ','){ row.push(field); field=""; i++; continue; }
        if(c === '\r'){ i++; continue; }
        if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=""; i++; continue; }
        field += c; i++; continue;
      }
    }
    if(field.length || row.length){ row.push(field); rows.push(row); }
    return rows.filter(function(r){ return r.some(function(c){ return String(c).trim() !== ""; }); });
  }

  function colIndex(header, keywords){
    for(var i=0;i<header.length;i++){
      var h = header[i].toLowerCase();
      for(var j=0;j<keywords.length;j++){
        if(h.indexOf(keywords[j]) > -1) return i;
      }
    }
    return -1;
  }

  function ensureKode(kodeStr){
    var found = S.kodeList.filter(function(k){ return k.kode.toLowerCase()===kodeStr.toLowerCase(); })[0];
    if(found) return found;
    var warnaCycle = ["blue","green","emerald","amber","violet","red","slate"];
    var k = { id:uid(), kode:kodeStr, nama:"Impor otomatis", warna:warnaCycle[S.kodeList.length % warnaCycle.length], aktif:true };
    S.kodeList.push(k);
    return k;
  }

  /**
   * Mendeteksi baris header (mencari kolom "Perihal" di 10 baris pertama,
   * supaya baris judul tambahan di atas tabel tidak mengganggu) dan indeks
   * tiap kolom yang relevan. Dipakai bersama oleh impor file DAN sinkron
   * Google Sheet supaya keduanya konsisten.
   */
  function detectColumns(rows){
    var headerIdx = 0;
    for(var hi=0; hi<Math.min(rows.length,10); hi++){
      if(colIndex(rows[hi], ["perihal"]) > -1){ headerIdx = hi; break; }
    }
    var header = rows[headerIdx];
    return {
      headerIdx: headerIdx,
      idxTujuan: colIndex(header, ["tujuan"]),
      idxTanggal: colIndex(header, ["tanggal"]),
      idxPerihal: colIndex(header, ["perihal"]),
      idxNomor: colIndex(header, ["nomor surat","nomor","no surat","no."]),
      idxKode: colIndex(header, ["kode klasifikasi","klasifikasi","kode"])
    };
  }

  function parseRowsToSurats(rows, cols){
    var out = [];
    for(var r=cols.headerIdx+1; r<rows.length; r++){
      var c = rows[r];
      var perihal = cols.idxPerihal>-1 ? String(c[cols.idxPerihal]||"").trim() : "";
      if(!perihal) continue;
      out.push({
        tujuan: cols.idxTujuan>-1 ? String(c[cols.idxTujuan]||"").trim() : "",
        tanggalRaw: cols.idxTanggal>-1 ? String(c[cols.idxTanggal]||"").trim() : "",
        perihal: perihal,
        nomorRaw: cols.idxNomor>-1 ? String(c[cols.idxNomor]||"").trim() : "",
        kodeExplicit: cols.idxKode>-1 ? String(c[cols.idxKode]||"").trim() : ""
      });
    }
    return out;
  }

  // Mengurai teks nomor surat pola "INSTANSI-KODE-URUT" (mis. W.9-KP.10.02-001)
  // menjadi { urut, kodeStr }. Mengembalikan null kalau tidak sesuai pola.
  function parseNomorRaw(nomorRaw){
    if(!nomorRaw) return null;
    var parts = nomorRaw.split("-");
    if(parts.length >= 3){
      var urutStr = parts[parts.length-1];
      var kodeStr = parts.slice(1, parts.length-1).join("-");
      if(/^\d+$/.test(urutStr) && kodeStr){
        return { urut: parseInt(urutStr,10), kodeStr: kodeStr };
      }
    }
    return null;
  }

  function extractSheetId(url){
    var m = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
    return m ? m[1] : null;
  }
  function extractGid(url){
    var m = url.match(/[#&?]gid=([0-9]+)/);
    return m ? m[1] : "0";
  }

  /**
   * Menerima tautan Google Sheets APA SAJA — tautan "Bagikan" biasa
   * (…/edit?usp=sharing), tautan dengan #gid=…, atau tautan CSV langsung
   * hasil "Publikasikan ke web" — dan mengembalikan daftar kandidat URL
   * CSV yang bisa dicoba satu per satu. Ini menghindarkan pengguna dari
   * harus mempublikasikan/mengubah pengaturan sheet master setiap kali.
   */
  function buildCandidateCsvUrls(rawUrl){
    var url = rawUrl.trim();
    if(/output=csv|format=csv|tqx=out:csv/.test(url)){
      return [url];
    }
    var id = extractSheetId(url);
    if(!id) return [];
    var gid = extractGid(url);
    return [
      "https://docs.google.com/spreadsheets/d/"+id+"/export?format=csv&gid="+gid,
      "https://docs.google.com/spreadsheets/d/"+id+"/gviz/tq?tqx=out:csv&gid="+gid
    ];
  }

  function tryFetchCsv(urls, idx, timeoutMs, lastErr){
    if(idx >= urls.length){
      return Promise.reject(lastErr || new Error("Semua percobaan pengambilan data gagal."));
    }
    var hasAbort = typeof AbortController !== "undefined";
    var controller = hasAbort ? new AbortController() : null;
    var timer = controller ? setTimeout(function(){ controller.abort(); }, timeoutMs) : null;

    return fetch(urls[idx], { cache:"no-store", signal: controller ? controller.signal : undefined })
      .then(function(res){
        if(timer) clearTimeout(timer);
        if(!res.ok) throw new Error("HTTP "+res.status);
        return res.text();
      })
      .then(function(text){
        if(/^\s*<(!doctype|html)/i.test(text) || /accounts\.google\.com\/ServiceLogin/i.test(text)){
          throw new Error("Sheet mengembalikan halaman login/HTML, bukan data — sheet belum bisa diakses publik.");
        }
        if(!text || !text.trim()){
          throw new Error("Sheet mengembalikan data kosong.");
        }
        return text;
      })
      .catch(function(err){
        if(timer) clearTimeout(timer);
        return tryFetchCsv(urls, idx+1, timeoutMs, err);
      });
  }

  /**
   * Kirim satu surat baru ke Google Sheet lewat Web App Apps Script
   * (fitur tulis-balik, opsional). Best-effort dan tidak pernah memblokir:
   * penyimpanan lokal SIMORIS selalu jadi sumber kebenaran utama — kalau
   * pengiriman ini gagal (offline, URL belum diatur, dsb), surat tetap
   * aman tersimpan secara lokal seperti biasa.
   */
  function pushSuratToSheet(surat){
    var url = (S.settings.appsScriptUrl||"").trim();
    if(!url) return;
    var qs = "tujuan="+encodeURIComponent(surat.tujuan||"")+
      "&tanggal="+encodeURIComponent(fmtTanggal(surat.tanggal))+
      "&perihal="+encodeURIComponent(surat.perihal||"")+
      "&nomor="+encodeURIComponent(displayNomor(surat));
    // mode "no-cors": kita tidak bisa membaca hasilnya, tapi permintaan
    // tetap terkirim & diproses di sisi Apps Script — cukup untuk aksi
    // "tulis" satu arah seperti ini.
    fetch(url + (url.indexOf("?")>-1 ? "&" : "?") + qs, { method:"GET", mode:"no-cors" })
      .catch(function(){ /* gagal diam-diam, data lokal tetap aman */ });
  }

  function refreshFromGoogleSheet(btn){
    var raw = (S.settings.googleSheetUrl||"").trim();
    if(!raw){
      showNotice("Tautan Belum Diatur", 'Tautan Google Sheet belum diatur.\n\nBuka "Kelola Kode" → bagian "Sumber data Google Sheet" untuk mengaturnya terlebih dahulu.');
      ui.modal = "kelola";
      render();
      return;
    }

    var candidates = buildCandidateCsvUrls(raw);
    if(!candidates.length){
      showNotice("Tautan Tidak Dikenali", 'Tautan Google Sheet tidak dikenali.\n\nTempel tautan "Bagikan" biasa dari Google Sheets, contoh:\nhttps://docs.google.com/spreadsheets/d/XXXXXXXX/edit');
      return;
    }

    var originalLabel = btn ? btn.textContent : "";
    if(btn){ btn.textContent = "Memuat..."; btn.disabled = true; }

    tryFetchCsv(candidates, 0, 15000, null)
      .then(function(text){
        syncFromGoogleSheetRows(parseCsv(text));
      })
      .catch(function(err){
        var isTimeout = err && err.name === "AbortError";
        showNotice("Gagal Refresh", 'Gagal mengambil data dari Google Sheet'+(isTimeout ? ' (waktu tunggu habis, koneksi terlalu lambat)' : '')+'.\n\n'+
          'Kemungkinan penyebab:\n'+
          '1. Sheet belum dibagikan sebagai "Siapa saja yang memiliki tautan → Dapat melihat" (klik Bagikan di Google Sheets, lalu ubah akses umum).\n'+
          '2. Tautan yang ditempel salah, sudah tidak berlaku, atau bukan tautan Google Sheets.\n'+
          '3. Perangkat ini sedang tidak terhubung ke internet.\n\n'+
          'Detail teknis: '+(err && err.message ? err.message : String(err)));
      })
      .then(function(){
        if(btn){ btn.textContent = originalLabel; btn.disabled = false; }
      });
  }

  function handleImportedText(text, filename){
    var isJson = /\.json$/i.test(filename) || /^\s*\{/.test(text);
    if(isJson){ importJsonBackup(text); }
    else { importRowsLegacy(parseCsv(text)); }
  }

  function handleImportedExcel(arrayBuffer){
    if(typeof XLSX === "undefined"){
      showNotice("Pustaka Belum Siap", "Pustaka pembaca Excel belum siap dimuat. Periksa koneksi internet Anda lalu muat ulang halaman.");
      return;
    }
    var wb;
    try{ wb = XLSX.read(arrayBuffer, { type:"array", cellDates:true }); }
    catch(e){ showNotice("File Tidak Terbaca", "File Excel tidak dapat dibaca. Pastikan file berformat .xlsx atau .xls yang valid."); return; }

    var ws = wb.Sheets[wb.SheetNames[0]];
    var raw = XLSX.utils.sheet_to_json(ws, { header:1, raw:true, defval:"" });
    var rows = raw.map(function(r){ return r.map(excelCellToStr); })
                  .filter(function(r){ return r.some(function(c){ return String(c).trim() !== ""; }); });
    importRowsLegacy(rows);
  }

  function excelCellToStr(v){
    if(v instanceof Date && !isNaN(v)){
      return v.getFullYear()+"-"+pad2(v.getMonth()+1)+"-"+pad2(v.getDate());
    }
    if(v === null || v === undefined) return "";
    return String(v).trim();
  }

  function importJsonBackup(text){
    var data;
    try{ data = JSON.parse(text); }
    catch(e){ showNotice("File Tidak Valid", "File JSON tidak valid."); return; }
    if(!data || !Array.isArray(data.surats) || !Array.isArray(data.kodeList)){
      showNotice("Format Tidak Dikenali", 'Struktur file JSON tidak dikenali. Gunakan file hasil tombol "Cadangkan".'); return;
    }
    showConfirm("Menimpa seluruh data saat ini ("+S.surats.length+" surat) dengan isi file cadangan ("+data.surats.length+" surat)?", function(){
      S = data;
      resortSurats();
      ui.page = 1;
      save(S);
      showToast("Data berhasil dipulihkan dari cadangan.");
    });
  }

  /**
   * Menerima data mentah berupa array-of-array (baris x kolom) — bisa berasal
   * dari file CSV atau Excel (.xlsx/.xls) hasil rekap manual seperti pada
   * spreadsheet lama: kolom TUJUAN SURAT, TANGGAL SURAT, PERIHAL, dan
   * NOMOR SURAT KELUAR / SURAT PERINTAH. Kolom NO diabaikan (dibuat ulang
   * otomatis). Header dicari otomatis di antara 10 baris pertama supaya
   * baris judul tambahan di atas tabel tidak mengganggu.
   */
  function importRowsLegacy(rows){
    if(rows.length < 2){ showNotice("File Kosong", "File kosong atau tidak terbaca."); return; }

    var cols = detectColumns(rows);
    if(cols.idxPerihal === -1){
      showNotice("Format Tidak Dikenali", 'Kolom "Perihal" tidak ditemukan. Pastikan file memiliki kolom Perihal seperti pada format spreadsheet sebelumnya.');
      return;
    }
    var parsedRows = parseRowsToSurats(rows, cols);

    var existingNomor = {};
    S.surats.forEach(function(s){ existingNomor[displayNomor(s)] = true; });

    // Pra-pindai seluruh baris untuk mencari nomor urut eksplisit tertinggi
    // di file ini, supaya baris tanpa nomor (diberi nomor otomatis) TIDAK
    // pernah bentrok dengan nomor eksplisit yang justru muncul belakangan
    // di file yang sama.
    parsedRows.forEach(function(pr){
      var parsed = parseNomorRaw(pr.nomorRaw);
      if(parsed && parsed.urut > S.counter) S.counter = parsed.urut;
    });

    var kodeUmum = null;
    var ditambahkan = 0, dilewati = 0, maxUrutImpor = 0;

    parsedRows.forEach(function(pr){
      var tanggal = parseTanggalIndo(pr.tanggalRaw) || isoToday(0);
      var kodeObj = null, urut = null;

      var parsed = parseNomorRaw(pr.nomorRaw);
      if(parsed){ urut = parsed.urut; kodeObj = ensureKode(parsed.kodeStr); }
      if(!kodeObj && pr.kodeExplicit){ kodeObj = ensureKode(pr.kodeExplicit); }
      if(!kodeObj){
        if(!kodeUmum) kodeUmum = ensureKode("IMPOR");
        kodeObj = kodeUmum;
      }
      if(urut === null){ S.counter += 1; urut = S.counter; }

      var nomorFinal = pr.nomorRaw || nomorSurat(urut, kodeObj.id);
      if(existingNomor[nomorFinal]){ dilewati++; return; }
      existingNomor[nomorFinal] = true;

      S.surats.push({
        id:uid(), urut:urut, kodeId:kodeObj.id, tujuan:pr.tujuan, perihal:pr.perihal,
        tanggal:tanggal, dibuatOleh:"", sumber:"manual", nomorOverride: pr.nomorRaw || null
      });
      ditambahkan++;
      if(urut > maxUrutImpor) maxUrutImpor = urut;
    });

    if(maxUrutImpor > S.counter) S.counter = maxUrutImpor;
    resortSurats();
    ui.page = 1;
    save(S);
    render();
    showToast(ditambahkan+" surat diimpor"+(dilewati?", "+dilewati+" dilewati (sudah ada)":"")+".");
  }

  /**
   * Sinkron dari Google Sheet — BERBEDA dari impor file biasa: ini
   * MENGGANTI TOTAL seluruh data yang berasal dari sheet (bukan menambah),
   * supaya jumlah data di SIMORIS selalu sama persis dengan jumlah baris
   * valid di sheet saat itu — tidak pernah menumpuk atau dobel walau
   * di-refresh berkali-kali. Data yang diterbitkan langsung dari SIMORIS
   * (sumber:"manual") maupun hasil impor file (sumber:"manual") TIDAK
   * disentuh oleh proses ini.
   */
  function syncFromGoogleSheetRows(rows){
    if(rows.length < 2){
      showNotice("Sheet Kosong", "Sheet tidak berisi data yang bisa disinkronkan.");
      return;
    }
    var cols = detectColumns(rows);
    if(cols.idxPerihal === -1){
      showNotice("Format Tidak Dikenali", 'Kolom "Perihal" tidak ditemukan di sheet ini. Pastikan sheet memiliki kolom Perihal seperti pada format spreadsheet sebelumnya.');
      return;
    }
    var parsedRows = parseRowsToSurats(rows, cols);

    if(!parsedRows.length){
      var hadSheetDataBefore = S.surats.some(function(s){ return s.sumber === "sheet"; });
      if(hadSheetDataBefore){
        showNotice("Refresh Dibatalkan",
          'Sheet tampak kosong (tidak ada baris data yang valid). Untuk mencegah kehilangan data, refresh dibatalkan dan data sebelumnya TIDAK diubah.\n\nJika sheet memang sengaja dikosongkan, hapus manual lewat "Hapus Semua Data" di Kelola Kode.');
        return;
      }
    }

    var posCounter = 0;
    var freshSheetSurats = parsedRows.map(function(pr){
      posCounter++;
      var tanggal = parseTanggalIndo(pr.tanggalRaw) || isoToday(0);
      var kodeObj = null, urut = null;

      var parsed = parseNomorRaw(pr.nomorRaw);
      if(parsed){ urut = parsed.urut; kodeObj = ensureKode(parsed.kodeStr); }
      if(!kodeObj && pr.kodeExplicit){ kodeObj = ensureKode(pr.kodeExplicit); }
      if(!kodeObj){ kodeObj = ensureKode("SHEET"); }
      if(urut === null){ urut = posCounter; }

      return {
        id: uid()+posCounter,
        urut: urut,
        kodeId: kodeObj.id,
        tujuan: pr.tujuan,
        perihal: pr.perihal,
        tanggal: tanggal,
        dibuatOleh: "",
        sumber: "sheet",
        nomorOverride: pr.nomorRaw || null
      };
    });

    // GANTI TOTAL: buang seluruh data lama bersumber sheet, pasang hasil
    // sinkron terbaru — bukan ditambahkan.
    S.surats = S.surats.filter(function(s){ return s.sumber !== "sheet"; }).concat(freshSheetSurats);
    resortSurats();
    ui.page = 1;
    save(S);
    render();
    showToast("Sinkron selesai — "+freshSheetSurats.length+" surat dari Google Sheet.");
  }

  // ---------------- layar login ----------------

  function renderLogin(errorMsg){
    document.getElementById("app").innerHTML =
      '<div class="login-wrap"><div class="login-card">'+
        '<div class="login-brand">'+
          '<div class="brand-mark">№</div>'+
          '<h1>SIMORIS</h1>'+
          '<p>Masuk untuk mengakses sistem penomoran surat</p>'+
        '</div>'+
        '<form id="loginForm">'+
          '<div class="field"><label>Kata Sandi</label><input type="password" id="loginPw" autofocus placeholder="Masukkan kata sandi" /></div>'+
          (errorMsg ? '<p class="error-text" style="margin-bottom:14px">'+esc(errorMsg)+'</p>' : '')+
          '<button type="submit" class="btn-dark">Masuk</button>'+
        '</form>'+
      '</div></div>';

    var form = document.getElementById("loginForm");
    var pwInput = document.getElementById("loginPw");
    pwInput.focus();
    form.onsubmit = function(e){
      e.preventDefault();
      if(simpleHash(pwInput.value) === getStoredPwHash()){
        setAuthed(true);
        render();
      } else {
        renderLogin("Kata sandi salah. Coba lagi.");
      }
    };
  }

  if(isAuthed()){
    render();
  } else {
    renderLogin();
  }
})();
</script>
