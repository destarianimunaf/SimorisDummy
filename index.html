<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIMORIS — Sistem Penomoran Surat Otomatis</title>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<!-- Excel (xlsx) & PDF (jspdf) SENGAJA TIDAK dimuat di sini — baru diambil dari CDN saat
     tombol Unduh Excel/PDF benar-benar diklik (lazy-load), supaya halaman pertama kali
     dibuka jauh lebih ringan/cepat, terutama di PC spek rendah atau koneksi lambat. -->
<!-- Google Fonts SENGAJA DIHAPUS: 3 keluarga font eksternal menambah permintaan
     jaringan yang menghambat render pertama (render-blocking) dan membuat halaman
     terasa lebih lambat terutama di koneksi lambat/PC spek rendah — dipakai font
     bawaan sistem saja, yang sudah tersedia instan tanpa perlu diunduh. -->

<style>
  :root{
    --ink-900:#12213f; --ink-800:#1a3157; --ink-700:#233f6b; --ink-600:#2c4c7c; --ink-400:#5b729c; --ink-300:#8a9bbd;
    --ink-100:#e3e9f2; --ink-50:#f3f6fa;
    --segel:#c98a2e; --segel-dark:#a8721f; --segel-bg:rgba(201,138,46,.10);
    --paper:#f8f6f1; --paper-2:#efece1;
    --red:#b3413a; --red-bg:#fbe9e7;
    --green:#2f7d5c; --green-bg:#e3f3ea;
    --amber-bg:#fbeed4; --amber:#9a6316;
    --violet:#6a4c93; --violet-bg:#ece5f5;
    --blue-bg:#e3e9f2;
    --slate:#475569; --slate-bg:#eef1f5;
    --font-display:ui-serif,Georgia,Cambria,"Times New Roman",Times,serif;
    --font-body:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --font-mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
    --shadow-sm:0 1px 2px rgba(18,33,63,.06);
    --shadow-md:0 8px 24px -10px rgba(18,33,63,.22);
    --shadow-lg:0 24px 60px -16px rgba(18,33,63,.35);
    --ease:cubic-bezier(.22,.9,.32,1.09);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; background:var(--paper); color:var(--ink-900);
    font-family:var(--font-body); font-size:14px; line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  .mono{ font-family:var(--font-mono); }
  ::selection{ background:var(--segel-bg); color:var(--ink-900); }
  :focus-visible{ outline:2.5px solid var(--segel); outline-offset:2px; border-radius:4px; }

  /* ---------- surface tekstur kertas resmi ---------- */
  .paper-texture{
    background-image:
      radial-gradient(circle at 100% 0%, rgba(201,138,46,.05), transparent 45%),
      repeating-linear-gradient(135deg, rgba(18,33,63,.018) 0px, rgba(18,33,63,.018) 1px, transparent 1px, transparent 13px);
  }

  header.app-header{ background:linear-gradient(180deg,var(--ink-900),#0e1a33); color:#fff; position:sticky; top:0; z-index:30; box-shadow:0 1px 0 rgba(255,255,255,.06), 0 10px 30px -18px rgba(0,0,0,.6); }
  .wrap{ max-width:1120px; margin:0 auto; padding:0 24px; }
  .header-inner{ display:flex; align-items:center; justify-content:space-between; gap:16px; padding:18px 0; flex-wrap:wrap; }
  .brand{ display:flex; align-items:center; gap:14px; }
  .brand-mark{ width:44px; height:44px; border-radius:10px; background:var(--segel);
    border:1.5px dashed rgba(255,255,255,.5); display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:17px; color:var(--ink-900); font-family:var(--font-display); flex-shrink:0;
    box-shadow:inset 0 0 0 3px rgba(255,255,255,.12); }
  .brand h1{ font-size:19px; margin:0; font-weight:700; letter-spacing:.3px; font-family:var(--font-display); }
  .brand p{ margin:2px 0 0; font-size:11.5px; color:rgba(255,255,255,.62); letter-spacing:.15px; }
  .header-actions{ display:flex; align-items:center; gap:14px; }
  .count-box{ text-align:right; }
  .count-box p{ margin:0; font-size:10.5px; color:rgba(255,255,255,.55); text-transform:uppercase; letter-spacing:.06em; font-weight:600; }
  .count-box strong{ font-size:21px; font-weight:700; font-family:var(--font-mono); color:#fff; }
  .btn{ border:none; cursor:pointer; font-weight:600; font-size:13px; border-radius:9px; padding:10px 16px;
    display:inline-flex; align-items:center; gap:6px; transition:background .15s var(--ease),transform .08s, box-shadow .15s; font-family:var(--font-body); }
  .btn:active{ transform:scale(.97); }
  .btn-segel{ background:var(--segel); color:#20140a; box-shadow:0 1px 0 rgba(255,255,255,.25) inset; }
  .btn-segel:hover{ background:#d99a3d; }
  .btn-segel:disabled{ opacity:.55; cursor:not-allowed; transform:none; }
  .btn-ghost{ background:#fff; color:var(--ink-800); border:1px solid var(--ink-100); }
  .btn-ghost:hover{ background:var(--ink-50); }
  .btn-dark{ background:var(--ink-900); color:#fff; }
  .btn-dark:hover{ background:var(--ink-800); }
  .btn-dark:disabled{ opacity:.55; cursor:not-allowed; }
  .btn-header-ghost{ background:transparent;color:#fff;border:1px solid rgba(255,255,255,.22); }
  .btn-header-ghost:hover{ background:rgba(255,255,255,.08); }
  .btn-header-muted{ background:transparent;color:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.16); padding:10px 12px; }
  .btn-header-muted:hover{ color:#fff; background:rgba(255,255,255,.08); }
  .btn-danger-text{ background:none; color:var(--red); font-weight:600; font-size:12px; padding:4px 6px; border:none; cursor:pointer; border-radius:6px; }
  .btn-danger-text:hover{ background:var(--red-bg); }

  .icon-btn{ width:31px; height:31px; border-radius:8px; border:none; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; transition:background .15s,transform .1s; flex-shrink:0; }
  .icon-btn:active{ transform:scale(.92); }
  .icon-btn svg{ width:15px; height:15px; }
  .icon-btn-edit{ background:var(--ink-50); color:var(--ink-600); }
  .icon-btn-edit:hover{ background:var(--ink-100); color:var(--ink-900); }
  .icon-btn-delete{ background:var(--red-bg); color:var(--red); }
  .icon-btn-delete:hover{ background:#f6cac6; }
  .pill-btn{ display:inline-flex; align-items:center; gap:6px; border:none; border-radius:8px; font-weight:600; font-size:12.5px; padding:9px 12px; cursor:pointer; transition:background .15s,transform .1s; font-family:var(--font-body); }
  .pill-btn:active{ transform:scale(.97); }
  .pill-btn svg{ width:14px; height:14px; flex-shrink:0; }
  .pill-btn-edit{ background:var(--ink-50); color:var(--ink-700); }
  .pill-btn-edit:hover{ background:var(--ink-100); }
  .pill-btn-delete{ background:var(--red-bg); color:var(--red); }
  .pill-btn-delete:hover{ background:#f6cac6; }

  .dropdown-wrap{ position:relative; display:inline-flex; }
  .dropdown-menu{ position:absolute; top:calc(100% + 6px); left:0; background:#fff; border:1px solid var(--ink-100); border-radius:11px; box-shadow:var(--shadow-lg); padding:6px; min-width:175px; z-index:40; animation:pop .13s var(--ease); transform-origin:top left; }
  .dropdown-item{ display:block; width:100%; text-align:left; background:none; border:none; padding:9px 12px; border-radius:7px; font-size:13px; color:var(--ink-800); cursor:pointer; font-weight:500; font-family:var(--font-body); }
  .dropdown-item:hover{ background:var(--ink-50); }
  @media (max-width:760px){ .dropdown-menu{ left:auto; right:0; } }

  .combobox-wrap{ position:relative; }
  .combobox-list{ position:absolute; top:calc(100% + 4px); left:0; right:0; background:#fff; border:1px solid var(--ink-100); border-radius:9px; box-shadow:var(--shadow-lg); max-height:230px; overflow-y:auto; z-index:55; padding:5px; animation:pop .12s var(--ease); }
  .combobox-item{ width:100%; text-align:left; background:none; border:none; padding:9px 10px; border-radius:7px; font-size:13px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:8px; font-family:inherit; }
  .combobox-item:hover{ background:var(--ink-50); }
  .combobox-item b{ font-family:var(--font-mono); }
  .combobox-empty{ padding:12px 10px; font-size:12.5px; color:var(--ink-400); text-align:center; }

  main{ padding:26px 0 60px; }
  .toolbar{ display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .toolbar input[type=text], .toolbar select{
    padding:10px 12px; border-radius:9px; border:1px solid var(--ink-100); font-size:13px; background:#fff;
    font-family:inherit; transition:border-color .15s, box-shadow .15s;
  }
  .toolbar input[type=text]:focus, .toolbar select:focus{ outline:none; border-color:var(--ink-600); box-shadow:0 0 0 3px rgba(44,76,124,.12); }
  .toolbar .search{ flex:1; min-width:220px; position:relative; }
  .toolbar .search input{ width:100%; padding-left:34px; }
  .toolbar .search svg{ position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--ink-400); pointer-events:none; }
  .toolbar select{ min-width:220px; }
  .toolbar-right{ display:flex; gap:8px; margin-left:auto; }
  .card{ background:#fff; border:1px solid var(--ink-100); border-radius:14px; box-shadow:var(--shadow-sm),var(--shadow-md); overflow:hidden; }
  table{ width:100%; border-collapse:collapse; }
  thead tr{ background:var(--ink-50); }
  th{ text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-600); font-weight:700; padding:12px 14px; }
  td{ padding:12px 14px; font-size:13px; border-top:1px solid var(--ink-100); vertical-align:middle; }
  tbody tr{ transition:background .1s; }
  tbody tr:hover{ background:#faf9f5; }
  .nomor-badge{ font-weight:700; background:var(--paper); border:1.5px dashed rgba(201,138,46,.55); border-radius:7px; padding:4px 10px; display:inline-block; color:var(--ink-800); letter-spacing:.2px; }
  .badge{ display:inline-flex; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:700; white-space:nowrap; }
  .truncate{ max-width:230px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .empty{ padding:56px 20px; text-align:center; }
  .empty svg{ color:var(--ink-300); margin-bottom:10px; }
  .empty p:first-child{ font-weight:700; margin:0 0 4px; font-family:var(--font-display); font-size:16px; }
  .empty p:last-child{ color:var(--ink-400); font-size:13px; margin:0; }
  .overlay{ position:fixed; inset:0; background:rgba(14,26,51,.55); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; padding:16px; z-index:50; animation:fadeIn .15s var(--ease); }
  .modal{ background:#fff; border-radius:18px; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-lg); animation:modalIn .18s var(--ease); }
  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
  @keyframes modalIn{ from{opacity:0; transform:translateY(10px) scale(.98)} to{opacity:1; transform:translateY(0) scale(1)} }
  @keyframes pop{ from{opacity:0; transform:scale(.94)} to{opacity:1; transform:scale(1)} }
  .modal-head{ padding:19px 22px; border-bottom:1px solid var(--ink-100); display:flex; justify-content:space-between; align-items:center; }
  .modal-head h2{ margin:0; font-size:16.5px; font-weight:700; font-family:var(--font-display); }
  .modal-close{ border:none; background:none; font-size:22px; line-height:1; color:var(--ink-400); cursor:pointer; width:30px;height:30px;border-radius:8px; }
  .modal-close:hover{ background:var(--ink-50); color:var(--ink-800); }
  .modal-body{ padding:22px; display:flex; flex-direction:column; gap:14px; }
  .field label{ display:block; font-size:10.5px; font-weight:700; color:var(--ink-600); margin-bottom:5px; text-transform:uppercase; letter-spacing:.04em; }
  .field input, .field select, .field textarea{ width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--ink-100); font-size:13px; font-family:inherit; transition:border-color .15s, box-shadow .15s; }
  .field input:focus, .field select:focus, .field textarea:focus{ outline:none; border-color:var(--ink-600); box-shadow:0 0 0 3px rgba(44,76,124,.12); }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .preview-box{ background:var(--paper); border:1.5px dashed rgba(201,138,46,.55); border-radius:9px; padding:11px 14px; display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .preview-box span:first-child{ font-size:11px; color:var(--ink-600); font-weight:600; }
  .preview-box span:last-child{ font-weight:700; font-family:var(--font-mono); }
  .form-actions{ display:flex; gap:10px; margin-top:4px; }
  .form-actions button{ flex:1; padding:11px; border-radius:9px; font-weight:700; font-size:13px; cursor:pointer; }
  .error-text{ color:var(--red); font-size:12px; font-weight:600; margin:0; }
  .kode-row{ display:flex; justify-content:space-between; align-items:center; background:var(--paper); border-radius:9px; padding:9px 12px; font-size:13px; gap:8px; }
  .kode-row + .kode-row{ margin-top:6px; }
  .hint{ color:var(--ink-400); font-size:11px; margin:0; }
  .toast{ position:fixed; bottom:22px; right:22px; left:22px; background:var(--ink-900); color:#fff; padding:13px 18px; border-radius:11px; font-size:13px; font-weight:600; box-shadow:var(--shadow-lg); z-index:60; display:flex; align-items:center; gap:10px; animation:toastIn .22s var(--ease); max-width:420px; margin-left:auto; }
  @keyframes toastIn{ from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:translateY(0)} }
  .toast svg{ color:var(--segel); flex-shrink:0; }
  .settings-row{ display:flex; gap:10px; }
  .badge-blue{ background:var(--blue-bg); color:var(--ink-800); }
  .badge-green{ background:var(--green-bg); color:var(--green); }
  .badge-emerald{ background:#e3f3ea; color:#1f6b46; }
  .badge-amber{ background:var(--amber-bg); color:var(--amber); }
  .badge-violet{ background:var(--violet-bg); color:var(--violet); }
  .badge-red{ background:var(--red-bg); color:var(--red); }
  .badge-slate{ background:var(--slate-bg); color:var(--slate); }
  footer.app-footer{ text-align:center; padding:28px 20px; color:var(--ink-400); font-size:12px; line-height:1.9; }
  .banner{ background:#fff8ec; border:1px solid #f0dbb0; color:#8a5a12; font-size:12px; padding:11px 14px; border-radius:11px; margin-bottom:16px; line-height:1.55; display:flex; gap:9px; }
  .banner svg{ flex-shrink:0; margin-top:1px; }
  .visually-hidden{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; }
  .spin{ animation:spin .8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .table-mobile{ display:none; }
  .surat-card{ background:#fff; border:1px solid var(--ink-100); border-radius:13px; padding:14px; margin-bottom:10px; }
  .surat-card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px; }
  .surat-card .nomor-badge{ font-size:12.5px; }
  .surat-card-perihal{ font-weight:700; font-size:13.5px; margin:0 0 4px; line-height:1.35; }
  .surat-card-meta{ color:var(--ink-600); font-size:12.5px; margin:0 0 2px; }
  .surat-card-actions{ display:flex; gap:8px; margin-top:10px; padding-top:10px; border-top:1px solid var(--ink-100); }
  .surat-card-actions .pill-btn{ flex:1; justify-content:center; }

  .row-clickable{ cursor:pointer; }
  .surat-card.row-clickable:active{ background:var(--paper); }
  tbody tr.row-clickable:hover .nomor-badge{ border-color:var(--segel); }

  .detail-hero{ text-align:center; padding:2px 0 6px; }
  .detail-hero .nomor-badge{ font-size:16px; padding:8px 16px; }
  .detail-grid{ display:flex; flex-direction:column; gap:10px; }
  .detail-row{ display:flex; flex-direction:column; gap:3px; padding:11px 12px; background:var(--paper); border-radius:9px; }
  .detail-label{ font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-600); }
  .detail-value{ font-size:14px; color:var(--ink-900); word-break:break-word; line-height:1.4; }

  .pagination{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:13px 14px; flex-wrap:wrap; }
  .pagination-info{ color:var(--ink-600); font-size:12.5px; }
  .pagination-controls{ display:flex; align-items:center; gap:6px; }
  .page-btn{ border:1px solid var(--ink-100); background:#fff; color:var(--ink-800); font-weight:600; font-size:12.5px;
    padding:7px 11px; border-radius:8px; cursor:pointer; min-width:34px; transition:background .12s; }
  .page-btn:hover:not(:disabled){ background:var(--ink-50); }
  .page-btn:disabled{ opacity:.4; cursor:not-allowed; }
  .page-btn.active{ background:var(--ink-900); color:#fff; border-color:var(--ink-900); }
  .page-jump{ display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--ink-600); }
  .page-size-select{ padding:7px 9px; border-radius:8px; border:1px solid var(--ink-100); font-size:12.5px; background:#fff; }

  @media (max-width:760px){
    .pagination{ flex-direction:column; align-items:stretch; text-align:center; }
    .pagination-controls{ justify-content:center; flex-wrap:wrap; }
  }

  .login-wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; background:var(--ink-900);
    background-image:radial-gradient(circle at 15% 10%, rgba(201,138,46,.14), transparent 45%), radial-gradient(circle at 85% 90%, rgba(44,76,124,.35), transparent 50%); }
  .login-card{ background:#fff; border-radius:18px; width:100%; max-width:380px; padding:34px 30px; box-shadow:var(--shadow-lg); animation:modalIn .25s var(--ease); }
  .login-brand{ display:flex; flex-direction:column; align-items:center; text-align:center; margin-bottom:26px; }
  .login-brand .brand-mark{ background:var(--segel); border:1.5px dashed rgba(201,138,46,.55); color:var(--ink-900); margin-bottom:13px; width:52px; height:52px; font-size:20px; }
  .login-brand h1{ font-size:20px; margin:0; font-weight:700; color:var(--ink-900); font-family:var(--font-display); }
  .login-brand p{ margin:5px 0 0; font-size:12.5px; color:var(--ink-400); }
  .login-card .field{ margin-bottom:16px; }
  .login-card button[type=submit]{ width:100%; padding:12px; border-radius:9px; font-weight:700; font-size:13.5px; cursor:pointer; }
  .login-hint{ text-align:center; margin-top:16px; font-size:11.5px; color:var(--ink-300); }

  .danger-zone{ border:1px solid rgba(179,65,58,.3); background:#fef4f3; border-radius:11px; padding:14px; }
  .code-snippet{ width:100%; font-family:var(--font-mono); font-size:11px; line-height:1.5; padding:10px; border-radius:9px; border:1px solid var(--ink-100); background:var(--paper); resize:vertical; color:var(--ink-800); }

  @media (max-width:760px){
    .wrap{ padding:0 16px; }
    body{ font-size:13.5px; }
    .header-inner{ padding:15px 0; gap:12px; }
    .brand h1{ font-size:16px; }
    .brand-mark{ width:38px;height:38px;font-size:15px; }
    .header-actions{ width:100%; justify-content:space-between; gap:8px; }
    .count-box{ display:none; }
    #btnKelola{ padding:9px 12px; font-size:12.5px; }
    #btnTambah{ flex:1; justify-content:center; }
    .toolbar{ gap:8px; }
    .toolbar select{ min-width:0; width:100%; }
    .toolbar-right{ margin-left:0; width:100%; gap:8px; flex-wrap:wrap; }
    .toolbar-right .btn{ flex:1 1 calc(50% - 4px); justify-content:center; padding:9px 8px; font-size:12px; white-space:nowrap; }
    .toolbar-right .dropdown-wrap{ flex:1 1 calc(50% - 4px); }
    .toolbar-right .dropdown-wrap .btn{ width:100%; }
    .grid2{ grid-template-columns:1fr; }
    .modal{ max-width:100%; border-radius:16px 16px 0 0; align-self:flex-end; }
    .overlay{ align-items:flex-end; padding:0; }
    .modal-body{ padding:18px; }
    .table-desktop{ display:none; }
    .table-mobile{ display:block; }
    .toast{ left:14px; right:14px; bottom:14px; max-width:none; }
  }
  @media print{
    header, .toolbar, .banner, .btn, .empty p:last-child{ display:none !important; }
    body{ background:#fff; }
    .card{ box-shadow:none; border:none; }
    .table-mobile{ display:none !important; }
    .table-desktop{ display:block !important; }
  }
</style>
</head>
<body>
<div id="root">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#12213f;color:rgba(255,255,255,.55);font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-size:13px;">Memuat SIMORIS…</div>
</div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ============================== KONSTANTA ============================== */

const STORE_KEY = "simoris_data_v1";
const AUTH_KEY = "simoris_authed_v1";
const PW_HASH_KEY = "simoris_pw_hash_v1";

// E=Perihal, F=Nomor Surat Keluar/Surat Perintah, G=ID (kolom tersembunyi baru,

// BARU (v8): aksi "list" bisa diberi parameter &count=100 untuk hanya mengambil
// N baris TERBARU saja (cepat, dipakai saat SIMORIS pertama dibuka), atau tanpa
// count sama sekali untuk mengambil SEMUA data (dipakai tombol "Muat Semua

// langsung di sisi Google Sheet dan cuma mengirim baris yang cocok balik ke

function simpleHash(str){
  let hash = 5381;
  for(let i=0;i<str.length;i++){ hash = ((hash << 5) + hash + str.charCodeAt(i)) >>> 0; }
  return hash.toString(16);
}

function setAuthedStorage(v){ try{ localStorage.setItem(AUTH_KEY, v?"1":"0"); }catch(e){} }

function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw){ const s = defaultState(); saveState(s); return s; }
    const parsed = JSON.parse(raw);
    if(!parsed.settings) parsed.settings = { instansiKode:"W.9", digit:3, appsScriptUrl:"" };
    if(typeof parsed.settings.appsScriptUrl === "undefined") parsed.settings.appsScriptUrl = "";
    if(!Array.isArray(parsed.kodeList)) parsed.kodeList = DEFAULT_KODE;
    if(!Array.isArray(parsed.surats)) parsed.surats = [];
    if(typeof parsed.counter !== "number") parsed.counter = 0;
    return parsed;
  }catch(e){ return defaultState(); }
}
function saveState(s){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }catch(e){} }
function cloneState(s){ return JSON.parse(JSON.stringify(s)); }

function kodeOf(S, id){ return S.kodeList.find(function(k){ return k.id===id; }) || null; }
function aktifKode(S){ return S.kodeList.filter(function(k){ return k.aktif; }); }
function nomorSurat(S, urut, kodeId){
  const k = kodeOf(S, kodeId);
  const kodeStr = k ? k.kode : "?";
  const padded = String(urut).padStart(S.settings.digit, "0");
  return S.settings.instansiKode + "-" + kodeStr + "-" + padded;
}
function displayNomor(S, s){ return s.nomorOverride || nomorSurat(S, s.urut, s.kodeId); }
function fmtTanggal(iso){
  if(!iso) return "—";
  const d = new Date(iso+"T00:00:00");
  if(isNaN(d)) return "—";
  return d.getDate()+" "+BULAN_NAMA[d.getMonth()]+" "+d.getFullYear();
}
function ensureKodeInDraft(draft, kodeStr){
  let found = draft.kodeList.find(function(k){ return k.kode.toLowerCase()===kodeStr.toLowerCase(); });
  if(found) return found;
  const k = { id:uid(), kode:kodeStr, nama:"Impor otomatis", warna:WARNA_CYCLE[draft.kodeList.length % WARNA_CYCLE.length], aktif:true };
  draft.kodeList.push(k);
  return k;
}

// Mengubah baris hasil action=search (Apps Script) menjadi objek surat untuk
// DITAMPILKAN SAJA — murni (tidak mengubah S.kodeList/S.surats sama sekali),
// dipakai saat pencarian sisi server supaya hasilnya tidak ikut "mengotori"
// data lokal yang sedang dimuat (mis. saat baru memuat 100 surat terbaru).
function mapSheetRowsToDisplay(S, rows){
  const list = rows.map(function(r){
    const tanggal = parseTanggalIndo(r.tanggal) || isoToday(0);
    const noNum = Number(r.no);
    const urut = (r.no !== "" && !isNaN(noNum) && noNum > 0) ? noNum : 0;
    const parsed = parseNomorRaw(r.nomor, S.settings.instansiKode);
    let kodeId = null;
    if(parsed){
      const found = S.kodeList.find(function(k){ return k.kode.toLowerCase()===parsed.kodeStr.toLowerCase(); });
      if(found) kodeId = found.id;
    }
    return { id:r.id, urut:urut, kodeId:kodeId, tujuan:r.tujuan||"", perihal:r.perihal||"", tanggal:tanggal, dibuatOleh:"", sumber:"synced", nomorOverride: r.nomor||null };
  });
  list.sort(function(a,b){ return b.urut - a.urut; });
  return list;
}

function parseTanggalIndo(str){
  if(!str) return null;
  str = String(str).trim();
  const iso = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(iso) return iso[1]+"-"+pad2(iso[2])+"-"+pad2(iso[3]);
  const slash = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(slash) return slash[3]+"-"+pad2(slash[1])+"-"+pad2(slash[2]);
  const indo = str.match(/^(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})$/);
  if(indo){
    const bulanIdx = BULAN_ID[indo[2].toLowerCase()];
    if(bulanIdx !== undefined) return indo[3]+"-"+pad2(bulanIdx+1)+"-"+pad2(indo[1]);
  }
  return null;
}
function parseCsv(text){
  const rows = []; let i=0, field="", row=[], inQuotes=false;
  text = text.replace(/^\uFEFF/, "");
  while(i < text.length){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){ if(text[i+1] === '"'){ field += '"'; i+=2; continue; } inQuotes=false; i++; continue; }
      field += c; i++; continue;
    } else {
      if(c === '"'){ inQuotes=true; i++; continue; }
      if(c === ','){ row.push(field); field=""; i++; continue; }
      if(c === '\r'){ i++; continue; }
      if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=""; i++; continue; }
      field += c; i++; continue;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(function(r){ return r.some(function(c){ return String(c).trim() !== ""; }); });
}
function colIndex(header, keywords){
  for(let i=0;i<header.length;i++){
    const h = String(header[i]||"").toLowerCase();
    for(let j=0;j<keywords.length;j++){ if(h.indexOf(keywords[j]) > -1) return i; }
  }
  return -1;
}
function detectColumns(rows){
  let headerIdx = 0;
  for(let hi=0; hi<Math.min(rows.length,10); hi++){
    if(colIndex(rows[hi], ["perihal"]) > -1){ headerIdx = hi; break; }
  }
  const header = rows[headerIdx];
  return {
    headerIdx: headerIdx,
    idxTujuan: colIndex(header, ["tujuan"]),
    idxTanggal: colIndex(header, ["tanggal"]),
    idxPerihal: colIndex(header, ["perihal"]),
    idxNomor: colIndex(header, ["nomor surat","nomor","no surat","no."]),
    idxKode: colIndex(header, ["kode klasifikasi","klasifikasi","kode"])
  };
}
function parseRowsToSurats(rows, cols){
  const out = [];
  for(let r=cols.headerIdx+1; r<rows.length; r++){
    const c = rows[r];
    const perihal = cols.idxPerihal>-1 ? String(c[cols.idxPerihal]||"").trim() : "";
    if(!perihal) continue;
    out.push({
      tujuan: cols.idxTujuan>-1 ? String(c[cols.idxTujuan]||"").trim() : "",
      tanggalRaw: cols.idxTanggal>-1 ? String(c[cols.idxTanggal]||"").trim() : "",
      perihal: perihal,
      nomorRaw: cols.idxNomor>-1 ? String(c[cols.idxNomor]||"").trim() : "",
      kodeExplicit: cols.idxKode>-1 ? String(c[cols.idxKode]||"").trim() : ""
    });
  }
  return out;
}
function parseNomorRaw(nomorRaw, instansiKode){
  if(!nomorRaw) return null;
  const text = String(nomorRaw).trim();
  const trailMatch = text.match(/(\d+)\s*$/);
  if(!trailMatch) return null;
  const urut = parseInt(trailMatch[1], 10);
  let rest = text.slice(0, text.length - trailMatch[0].length);
  rest = rest.replace(/[.\-\s]+$/, ""); // buang pemisah sebelum angka, mis. "...-" atau "..."

  // 1) Utamakan pola kode klasifikasi resmi seperti "UM.01.01" / "PB.01.02"
  //    (huruf lalu kelompok titik-angka) — ambil kemunculan TERAKHIR di teks,
  //    supaya kode instansi seperti "W.9" (cuma 1 huruf) tidak ikut terambil.
  const dotMatches = rest.match(/[A-Za-z]{2,8}(?:\.\d{1,3}){1,3}/g);
  if(dotMatches && dotMatches.length){
    return { urut: urut, kodeStr: dotMatches[dotMatches.length-1].toUpperCase() };
  }

  // 2) Fallback untuk kode sederhana tanpa titik (mis. "UM" bawaan SIMORIS):
  //    buang awalan kode instansi, sisanya dianggap kode klasifikasi.
  if(instansiKode){
    const ik = String(instansiKode).trim();
    if(ik && rest.toLowerCase().indexOf(ik.toLowerCase()) === 0) rest = rest.slice(ik.length);
  }
  rest = rest.replace(/^[.\-\s]+/, ""); // buang pemisah setelah kode instansi
  if(!rest) return null;
  return { urut: urut, kodeStr: rest };
}
function excelCellToStr(v){
  if(v instanceof Date && !isNaN(v)) return v.getFullYear()+"-"+pad2(v.getMonth()+1)+"-"+pad2(v.getDate());
  if(v === null || v === undefined) return "";
  return String(v).trim();
}
function applyImportToDraft(draft, parsedRows){
  const existingNomor = {};
  draft.surats.forEach(function(s){ existingNomor[displayNomor(draft,s)] = true; });
  parsedRows.forEach(function(pr){
    const parsed = parseNomorRaw(pr.nomorRaw, draft.settings.instansiKode);
    if(parsed && parsed.urut > draft.counter) draft.counter = parsed.urut;
  });
  let kodeUmum=null, ditambahkan=0, dilewati=0, maxUrutImpor=0;
  parsedRows.forEach(function(pr){
    const tanggal = parseTanggalIndo(pr.tanggalRaw) || isoToday(0);
    let kodeObj=null, urut=null;
    const parsed = parseNomorRaw(pr.nomorRaw, draft.settings.instansiKode);
    if(parsed){ urut = parsed.urut; kodeObj = ensureKodeInDraft(draft, parsed.kodeStr); }
    if(!kodeObj && pr.kodeExplicit) kodeObj = ensureKodeInDraft(draft, pr.kodeExplicit);
    if(!kodeObj){ if(!kodeUmum) kodeUmum = ensureKodeInDraft(draft, "IMPOR"); kodeObj = kodeUmum; }
    if(urut === null){ draft.counter += 1; urut = draft.counter; }
    const nomorFinal = pr.nomorRaw || nomorSurat(draft, urut, kodeObj.id);
    if(existingNomor[nomorFinal]){ dilewati++; return; }
    existingNomor[nomorFinal] = true;
    draft.surats.push({ id:uid(), urut:urut, kodeId:kodeObj.id, tujuan:pr.tujuan, perihal:pr.perihal, tanggal:tanggal, dibuatOleh:"", sumber:"manual", nomorOverride: pr.nomorRaw||null });
    ditambahkan++;
    if(urut > maxUrutImpor) maxUrutImpor = urut;
  });
  if(maxUrutImpor > draft.counter) draft.counter = maxUrutImpor;
  draft.surats.sort(function(a,b){ return b.urut - a.urut; });
  return { ditambahkan: ditambahkan, dilewati: dilewati };
}
/* ---------- Sinkron Google Sheet (Sheet = database master) ----------
   Semua baca/tulis lewat SATU URL Apps Script (?action=list|add|update|delete).
   Tidak lagi memakai tautan "Bagikan" CSV — sheet boleh tetap privat, karena
   Apps Script yang mengeksekusi dengan izin pemilik skrip. */
async function callSheetAction(S, action, params, timeoutMs){
  const url = (S.settings.appsScriptUrl||"").trim();
  if(!url) return { ok:false, reason:"no-url" };
  const qs = ["action="+encodeURIComponent(action)];
  Object.keys(params||{}).forEach(function(k){ qs.push(k+"="+encodeURIComponent(params[k]==null?"":params[k])); });
  const full = url + (url.indexOf("?")>-1 ? "&" : "?") + qs.join("&");
  try{
    const hasAbort = typeof AbortController !== "undefined";
    const controller = hasAbort ? new AbortController() : null;
    const timer = controller ? setTimeout(function(){ controller.abort(); }, timeoutMs||15000) : null;
    const res = await fetch(full, { method:"GET", cache:"no-store", signal: controller ? controller.signal : undefined });
    if(timer) clearTimeout(timer);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    if(!data || typeof data.ok === "undefined") throw new Error("Respons tidak valid dari Apps Script.");
    return data;
  }catch(err){
    return { ok:false, reason:"network", error: err && err.message ? err.message : String(err) };
  }
}

const _scriptCache = {};
function loadScriptOnce(src){
  if(_scriptCache[src]) return _scriptCache[src];
  _scriptCache[src] = new Promise(function(resolve, reject){
    const el = document.createElement("script");
    el.src = src;
    el.onload = function(){ resolve(true); };
    el.onerror = function(){ delete _scriptCache[src]; reject(new Error("Gagal memuat "+src)); };
    document.head.appendChild(el);
  });
  return _scriptCache[src];
}
async function ensureXlsxLoaded(){
  if(typeof XLSX !== "undefined") return true;
  try{ await loadScriptOnce("https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"); return typeof XLSX !== "undefined"; }
  catch(e){ return false; }
}
async function ensureJsPdfLoaded(){
  if(typeof window.jspdf !== "undefined" && window.jspdf.jsPDF && window.jspdf.jsPDF.API && window.jspdf.jsPDF.API.autoTable) return true;
  try{
    await loadScriptOnce("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");
    await loadScriptOnce("https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js");
    return typeof window.jspdf !== "undefined";
  }catch(e){ return false; }
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function exportCsvFile(S, rows){
  const header = ["No","Tujuan Surat","Tanggal Surat","Perihal","Nomor Surat","Kode Klasifikasi"];
  const lines = [header.join(",")];
  rows.forEach(function(s){
    const k = kodeOf(S, s.kodeId);
    const cells = [s.urut, s.tujuan||"", fmtTanggal(s.tanggal), s.perihal, displayNomor(S,s), k?k.kode:""].map(function(c){
      const v = String(c).replace(/"/g,'""');
      return /[",\n]/.test(v) ? '"'+v+'"' : v;
    });
    lines.push(cells.join(","));
  });
  downloadBlob(new Blob(["\uFEFF"+lines.join("\r\n")], { type:"text/csv;charset=utf-8;" }), "simoris-rekap-"+isoToday(0)+".csv");
}
async function exportExcelFile(S, rows){
  const ready = await ensureXlsxLoaded();
  if(!ready) return false;
  const sorted = rows.slice().sort(function(a,b){ return a.urut-b.urut; });
  const data = [["NO","TUJUAN SURAT","TANGGAL SURAT","PERIHAL","NOMOR SURAT KELUAR / SURAT PERINTAH"]];
  sorted.forEach(function(s, idx){ data.push([idx+1, s.tujuan||"", fmtTanggal(s.tanggal), s.perihal, displayNomor(S,s)]); });
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:5},{wch:22},{wch:18},{wch:42},{wch:30}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "SIMORIS");
  XLSX.writeFile(wb, "simoris-rekap-"+isoToday(0)+".xlsx");
  return true;
}
async function exportPdfFile(S, rows){
  const ready = await ensureJsPdfLoaded();
  if(!ready) return false;
  const sorted = rows.slice().sort(function(a,b){ return a.urut-b.urut; });
  const body = sorted.map(function(s, idx){ return [idx+1, s.tujuan||"-", fmtTanggal(s.tanggal), s.perihal, displayNomor(S,s)]; });
  const doc = new window.jspdf.jsPDF({ orientation:"landscape", unit:"pt", format:"a4" });
  doc.setFontSize(13); doc.text("SIMORIS - Rekap Surat", 40, 34);
  doc.setFontSize(9); doc.setTextColor(120);
  doc.text("Diunduh "+fmtTanggal(isoToday(0))+" - "+sorted.length+" surat", 40, 48);
  doc.autoTable({
    startY:60, head:[["No","Tujuan Surat","Tanggal Surat","Perihal","Nomor Surat"]], body:body,
    styles:{ fontSize:9, cellPadding:6 }, headStyles:{ fillColor:[18,33,63], textColor:255, fontStyle:"bold" },
    alternateRowStyles:{ fillColor:[248,246,241] }, columnStyles:{ 0:{ cellWidth:30 } }
  });
  doc.save("simoris-rekap-"+isoToday(0)+".pdf");
  return true;
}
function exportJsonBackup(S){

function Pagination({ page, totalPages, total, pageSize, start, onPrev, onNext, onPage, onPageSize }){
  const from = total ? start+1 : 0;
  const to = Math.min(start+pageSize, total);
  let lo = Math.max(1, page-2), hi = Math.min(totalPages, page+2);
  if(page<=3) hi = Math.min(totalPages, 5);
  if(page>=totalPages-2) lo = Math.max(1, totalPages-4);
  const nums = [];
  for(let i=lo;i<=hi;i++) nums.push(i);
  return (
    <div className="pagination">
      <div className="pagination-info">Menampilkan <b>{from}–{to}</b> dari <b>{total}</b> surat</div>
      <div className="pagination-controls">
        <button className="page-btn" disabled={page<=1} onClick={onPrev}>‹ Sebelumnya</button>
        {lo>1 && <button className="page-btn" onClick={()=>onPage(1)}>1</button>}
        {lo>2 && <span style={{padding:"0 2px",color:"var(--ink-400)"}}>…</span>}
        {nums.map(n => <button key={n} className={"page-btn"+(n===page?" active":"")} onClick={()=>onPage(n)}>{n}</button>)}
        {hi<totalPages-1 && <span style={{padding:"0 2px",color:"var(--ink-400)"}}>…</span>}
        {hi<totalPages && <button className="page-btn" onClick={()=>onPage(totalPages)}>{totalPages}</button>}
        <button className="page-btn" disabled={page>=totalPages} onClick={onNext}>Berikutnya ›</button>
      </div>
      <div className="pagination-controls">
        <label className="page-jump">Per halaman
          <select className="page-size-select" value={pageSize} onChange={function(e){ onPageSize(Number(e.target.value)); }} style={{marginLeft:6}}>
            {[25,50,100,200,500].map(n => <option key={n} value={n}>{n}</option>)}
          </select>
        </label>
      </div>
    </div>
  );
}

function KodeCombobox({ options, value, onChange, placeholder }){
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState("");
  const wrapRef = useRef(null);
  const inputRef = useRef(null);
  const selected = options.find(function(k){ return k.id===value; }) || null;

  useEffect(function(){
    if(!open) return;
    function onDocClick(e){ if(wrapRef.current && !wrapRef.current.contains(e.target)){ setOpen(false); setQuery(""); } }
    document.addEventListener("mousedown", onDocClick);
    return function(){ document.removeEventListener("mousedown", onDocClick); };
  }, [open]);

  const q = query.trim().toLowerCase();
  const filtered = q
    ? options.filter(function(k){ return (k.kode+" "+k.nama).toLowerCase().indexOf(q) > -1; })
    : options;

  function pick(k){
    onChange(k.id);
    setOpen(false);
    setQuery("");
  }

  return (
    <div className="combobox-wrap" ref={wrapRef}>
      <input
        ref={inputRef}
        type="text"
        placeholder={placeholder||"Cari kode atau nama..."}
        value={open ? query : (selected ? (selected.kode+" — "+selected.nama+(selected.aktif?"":" (nonaktif)")) : "")}
        onFocus={function(){ setOpen(true); setQuery(""); }}
        onChange={function(e){ setQuery(e.target.value); }}
        onKeyDown={function(e){
          if(e.key==="Escape"){ setOpen(false); setQuery(""); }
          if(e.key==="Enter" && filtered.length){ e.preventDefault(); pick(filtered[0]); }
        }}
      />
      {open && (
        <div className="combobox-list">
          {filtered.length ? filtered.map(function(k){
            return (
              <button type="button" key={k.id} className="combobox-item" onMouseDown={function(e){ e.preventDefault(); pick(k); }}>
                <span><b>{k.kode}</b> — {k.nama}{k.aktif?"":" (nonaktif)"}</span>
                {k.id===value && <IconCheck size={14}/>}
              </button>
            );
          }) : <div className="combobox-empty">Tidak ada kode yang cocok.</div>}
        </div>
      )}
    </div>
  );
}

      setKodeId(opsiKodeBase[0] ? opsiKodeBase[0].id : null);
      setTanggal(isoToday(0));
      setTujuan(""); setPerihal(""); setDibuatOleh("");
    }
    setError("");
  }, [open, editing]);

  if(!open) return null;

  let opsiKode = opsiKodeBase;
  if(editing){
    const kodeEditing = kodeOf(S, editing.kodeId);
    if(kodeEditing && !kodeEditing.aktif) opsiKode = opsiKode.concat([kodeEditing]);
  }

  const previewUrut = editing ? editing.urut : (S.counter + 1);
  let preview;
  if(editing && editing.nomorOverride && kodeId === editing.kodeId){
    preview = editing.nomorOverride;
  } else {
    preview = kodeId ? nomorSurat(S, previewUrut, kodeId) : "—";
  }

  function submit(){
    if(!kodeId){ setError("Pilih kode klasifikasi."); return; }
    if(!tanggal){ setError("Tanggal surat wajib diisi."); return; }
    if(!perihal.trim()){ setError("Perihal wajib diisi."); return; }
    setError("");
    onSubmit({ kodeId: Number(kodeId), tanggal: tanggal, tujuan: tujuan.trim(), perihal: perihal.trim(), dibuatOleh: dibuatOleh.trim() });
  }

  return (
    <div className="overlay" onClick={function(e){ if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal">
        <div className="modal-head">
          <h2>{editing ? "Ubah Surat" : "Terbitkan Nomor Baru"}</h2>
          <button className="modal-close" onClick={onClose}>&times;</button>
        </div>
        <div className="modal-body">
          <div className="preview-box">
            <span>{editing ? "Nomor surat (tidak dapat diubah)" : "Nomor surat akan menjadi"}</span>
            <span className="mono">{preview}</span>
          </div>
          {!opsiKodeBase.length && <p className="error-text">Belum ada kode klasifikasi aktif. Tambahkan lewat "Kelola Kode" dulu.</p>}
          <div className="field">
            <label>Kode Klasifikasi</label>
            <KodeCombobox options={opsiKode} value={kodeId} onChange={setKodeId} placeholder="Ketik untuk mencari kode/nama..."/>
          </div>
          <div className="grid2">
            <div className="field"><label>Tanggal Surat</label><input type="date" value={tanggal} onChange={function(e){ setTanggal(e.target.value); }}/></div>
            <div className="field"><label>Tujuan Surat</label><input type="text" placeholder="Nama/bagian tujuan" value={tujuan} onChange={function(e){ setTujuan(e.target.value); }}/></div>
          </div>
          <div className="field"><label>Perihal</label><input type="text" placeholder="Contoh: PAK Cory / Surat Undangan Rapat" value={perihal} onChange={function(e){ setPerihal(e.target.value); }}/></div>
          <div className="field"><label>Dibuat oleh (opsional)</label><input type="text" placeholder="Nama petugas" value={dibuatOleh} onChange={function(e){ setDibuatOleh(e.target.value); }}/></div>
          {error && <p className="error-text">{error}</p>}
          <div className="form-actions">
            <button className="btn-ghost" onClick={onClose} disabled={submitting}>Batal</button>
            <button className="btn-dark" onClick={submit} disabled={!opsiKodeBase.length || submitting}>
              {submitting ? "Menerbitkan..." : (editing ? "Simpan Perubahan" : "Terbitkan")}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}
