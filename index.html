/* ============================== MODAL: KELOLA KODE ============================== */

function KelolaModal({ open, S, onClose, mutateS, showToast, showNotice, showConfirm, onOpenHapusSemua, onSaveAndRefresh, masterMode }){
  const [newKode, setNewKode] = useState("");
  const [newNama, setNewNama] = useState("");
  const [kodeErr, setKodeErr] = useState("");

  const [setInstansi, setSetInstansi] = useState(S.settings.instansiKode);
  const [setDigit, setSetDigit] = useState(S.settings.digit);

  const [pwOld, setPwOld] = useState(""); const [pwNew, setPwNew] = useState(""); const [pwNewConfirm, setPwNewConfirm] = useState("");
  const [pwErr, setPwErr] = useState("");

  const [appsExpanded, setAppsExpanded] = useState(!masterMode);
  const [appsUrl, setAppsUrl] = useState(S.settings.appsScriptUrl||"");
  const [appsErr, setAppsErr] = useState("");
  const [copied, setCopied] = useState(false);
  const [savingApps, setSavingApps] = useState(false);

  useEffect(function(){
    if(open){
      setSetInstansi(S.settings.instansiKode);
      setSetDigit(S.settings.digit);
      setAppsUrl(S.settings.appsScriptUrl||"");
      setAppsExpanded(!masterMode);
      setNewKode(""); setNewNama(""); setKodeErr("");
      setPwOld(""); setPwNew(""); setPwNewConfirm(""); setPwErr("");
      setAppsErr("");
    }
  }, [open]);

  if(!open) return null;

  function addKode(){
    const kode = newKode.trim(), nama = newNama.trim();
    if(!kode || !nama){ setKodeErr("Isi kode dan nama."); return; }
    const dup = S.kodeList.some(function(k){ return k.kode.toLowerCase()===kode.toLowerCase(); });
    if(dup){ setKodeErr("Kode ini sudah ada."); return; }
    mutateS(function(draft){
      draft.kodeList.push({ id:uid(), kode:kode, nama:nama, warna:WARNA_CYCLE[draft.kodeList.length % WARNA_CYCLE.length], aktif:true });
    });
    setKodeErr(""); setNewKode(""); setNewNama("");
    showToast("Kode "+kode+" ditambahkan.");
  }
  function toggleAktif(id, aktif){
    mutateS(function(draft){ const k = draft.kodeList.find(x=>x.id===id); if(k) k.aktif = aktif; });
  }
  function saveSettings(){
    const instansi = setInstansi.trim() || "W.9";
    const digit = Math.max(1, Math.min(6, Number(setDigit)||3));
    mutateS(function(draft){ draft.settings.instansiKode = instansi; draft.settings.digit = digit; });
    showToast("Pengaturan disimpan.");
  }
  function changePw(){
    if(simpleHash(pwOld) !== getStoredPwHash()){ setPwErr("Kata sandi saat ini salah."); return; }
    if(pwNew.length < 4){ setPwErr("Kata sandi baru minimal 4 karakter."); return; }
    if(pwNew !== pwNewConfirm){ setPwErr("Konfirmasi kata sandi baru tidak cocok."); return; }
    setStoredPwHash(simpleHash(pwNew));
    setPwOld(""); setPwNew(""); setPwNewConfirm(""); setPwErr("");
    showToast("Kata sandi berhasil diubah.");
  }
  function copySnippet(){
    function done(){ setCopied(true); setTimeout(function(){ setCopied(false); }, 1800); }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(APPS_SCRIPT_SNIPPET).then(done).catch(done);
    } else { done(); }
  }
  function saveAppsUrlOnly(){
    const url = appsUrl.trim();
    if(url && !/^https:\/\/script\.google\.com\/macros\//.test(url)){
      setAppsErr("URL sepertinya bukan URL Web App Apps Script. Harus diawali https://script.google.com/macros/...");
      return false;
    }
    setAppsErr("");
    mutateS(function(draft){ draft.settings.appsScriptUrl = url; });
    return true;
  }
  function saveAppsUrl(){
    if(saveAppsUrlOnly()) showToast(appsUrl.trim() ? "URL Apps Script disimpan." : "URL Apps Script dikosongkan — kembali ke mode lokal.");
  }
  async function saveAndRefresh(){
    if(!appsUrl.trim()){ setAppsErr("Isi URL Apps Script terlebih dahulu."); return; }
    if(!saveAppsUrlOnly()) return;
    setSavingApps(true);
    onClose();
    onSaveAndRefresh();
    setSavingApps(false);
  }

  return (
    <div className="overlay" onClick={function(e){ if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal">
        <div className="modal-head"><h2>Kelola Kode Klasifikasi</h2><button className="modal-close" onClick={onClose}>&times;</button></div>
        <div className="modal-body">
          <div className="banner"><IconInfo size={15}/><span>Kode klasifikasi ditambahkan manual sesuai kebutuhan kantor Anda. Yang otomatis hanya deret nomor urut di belakang (mis. ...-001, ...-002, dst).</span></div>

          <div>
            {S.kodeList.map(function(k){
              return (
                <div className="kode-row" key={k.id}>
                  <div><b className="mono">{k.kode}</b> &nbsp;{k.nama}{!k.aktif && <span style={{color:"var(--ink-400)"}}> (nonaktif)</span>}</div>
                  {k.aktif
                    ? <button className="btn-danger-text" onClick={function(){ toggleAktif(k.id, false); }}>Nonaktifkan</button>
                    : <button className="btn-danger-text" style={{color:"var(--green)"}} onClick={function(){ toggleAktif(k.id, true); }}>Aktifkan</button>}
                </div>
              );
            })}
          </div>

          <div style={{borderTop:"1px solid var(--ink-100)",paddingTop:14}}>
            <p className="hint" style={{marginBottom:8,fontWeight:700,color:"var(--ink-600)",textTransform:"uppercase",fontSize:11}}>Tambah kode manual</p>
            <div className="grid2">
              <div className="field"><label>Kode</label><input type="text" placeholder="mis. KP atau KP.10.02" value={newKode} onChange={function(e){ setNewKode(e.target.value); }}/></div>
              <div className="field"><label>Nama</label><input type="text" placeholder="mis. Kepegawaian" value={newNama} onChange={function(e){ setNewNama(e.target.value); }}/></div>
            </div>
            {kodeErr && <p className="error-text" style={{marginTop:8}}>{kodeErr}</p>}
            <button className="btn-dark" onClick={addKode} style={{width:"100%",marginTop:10,padding:10,borderRadius:8}}>+ Tambah Kode</button>
          </div>

          <div style={{borderTop:"1px solid var(--ink-100)",paddingTop:14}}>
            <p className="hint" style={{marginBottom:8,fontWeight:700,color:"var(--ink-600)",textTransform:"uppercase",fontSize:11}}>Pengaturan penomoran</p>
            <div className="settings-row">
              <div className="field" style={{flex:1}}><label>Kode Instansi</label><input type="text" value={setInstansi} onChange={function(e){ setSetInstansi(e.target.value); }}/></div>
              <div className="field" style={{width:110}}><label>Digit Nomor</label><input type="number" min="1" max="6" value={setDigit} onChange={function(e){ setSetDigit(e.target.value); }}/></div>
            </div>
            <button className="btn-ghost" onClick={saveSettings} style={{width:"100%",marginTop:8,padding:10,borderRadius:8}}>Simpan Pengaturan</button>
          </div>

          <div style={{borderTop:"1px solid var(--ink-100)",paddingTop:14}}>
            <p className="hint" style={{marginBottom:8,fontWeight:700,color:"var(--ink-600)",textTransform:"uppercase",fontSize:11}}>Ubah kata sandi akses</p>
            <div className="field"><label>Kata sandi saat ini</label><input type="password" placeholder="Kata sandi saat ini" value={pwOld} onChange={function(e){ setPwOld(e.target.value); }}/></div>
            <div className="grid2" style={{marginTop:10}}>
              <div className="field"><label>Kata sandi baru</label><input type="password" placeholder="Minimal 4 karakter" value={pwNew} onChange={function(e){ setPwNew(e.target.value); }}/></div>
              <div className="field"><label>Ulangi kata sandi baru</label><input type="password" placeholder="Ulangi kata sandi baru" value={pwNewConfirm} onChange={function(e){ setPwNewConfirm(e.target.value); }}/></div>
            </div>
            {pwErr && <p className="error-text" style={{marginTop:8}}>{pwErr}</p>}
            <button className="btn-dark" onClick={changePw} style={{width:"100%",marginTop:10,padding:10,borderRadius:8}}>Ubah Kata Sandi</button>
          </div>

          <div style={{borderTop:"1px solid var(--ink-100)",paddingTop:14}}>
            <button onClick={function(){ setAppsExpanded(!appsExpanded); }} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",background:"none",border:"none",padding:0,cursor:"pointer",textAlign:"left"}}>
              <span className="hint" style={{fontWeight:700,color:"var(--ink-600)",textTransform:"uppercase",fontSize:11}}>Sinkron Google Sheet (data master)</span>
              <span style={{color:"var(--ink-400)",transition:"transform .15s",transform:appsExpanded?"rotate(180deg)":"none"}}><IconChevronDown size={14}/></span>
            </button>
            {masterMode
              ? <p className="hint" style={{marginTop:6,color:"var(--green)"}}>✓ Aktif — Google Sheet adalah data master. Setiap terbitkan/ubah/hapus surat di SIMORIS langsung tersinkron ke sheet, dan sebaliknya.</p>
              : <p className="hint" style={{marginTop:6}}>Nonaktif. SIMORIS memakai penyimpanan lokal di peramban ini saja.</p>}
            {masterMode && (
              <button className="btn btn-segel" onClick={function(){ onClose(); onSaveAndRefresh(); }} style={{width:"100%",marginTop:10,justifyContent:"center",padding:10}}>
                <IconRefresh size={14}/>Sinkron Manual Sekarang
              </button>
            )}
            {appsExpanded && (
              <div style={{marginTop:12}}>
                <p className="hint" style={{marginBottom:10,lineHeight:1.5}}>
                  Dengan fitur ini, <b>Google Sheet Anda menjadi database utama/master</b> — SIMORIS hanya menjadi tampilan yang selalu mencerminkan isi sheet itu persis. Sheet boleh tetap privat (tidak perlu dibagikan ke publik) karena semua akses lewat Apps Script berikut. Skrip ini dibuat khusus untuk sheet dengan data mulai <b>kolom B</b> (kolom A dibiarkan kosong): B=No, C=Tujuan Surat, D=Tanggal Surat, E=Perihal, F=Nomor Surat. Ikuti langkah ini:
                </p>
                <ol style={{fontSize:12.5,color:"var(--ink-700)",lineHeight:2,margin:"0 0 12px",paddingLeft:20}}>
                  <li>Buka Google Sheet Anda, klik menu <b>Extensions</b> → <b>Apps Script</b>.</li>
                  <li>Hapus tulisan yang ada, lalu tempel kode di bawah ini (klik "Salin Kode" dulu).</li>
                  <li>Klik <b>Deploy</b> (kanan atas) → <b>New deployment</b> (kalau sudah pernah deploy sebelumnya: <b>Manage deployments</b> → ikon pensil → Version: "New version" → Deploy — supaya versi terbaru yang aktif, bukan yang lama).</li>
                  <li>Klik ikon gerigi di samping "Select type" → pilih <b>Web app</b> (langkah ini dilewati kalau memakai "Manage deployments").</li>
                  <li>Pada "Who has access", pilih <b>Anyone</b> → klik <b>Deploy</b> → izinkan akses jika diminta.</li>
                  <li>Salin <b>URL Web app</b> yang muncul → tempel di kolom di bawah → <b>Simpan &amp; Sinkron Sekarang</b>.</li>
                </ol>
                <div className="banner" style={{marginBottom:12}}><IconInfo size={15}/><span>Kolom G akan otomatis dipakai skrip ini sebagai ID tersembunyi per baris — boleh diberi judul "ID" atau dibiarkan tanpa judul, jangan diisi manual.</span></div>
                <div style={{position:"relative"}}>
                  <textarea className="code-snippet" readOnly rows={9} value={APPS_SCRIPT_SNIPPET} onClick={function(e){ e.target.select(); }}/>
                  <button className="btn btn-ghost" onClick={copySnippet} style={{position:"absolute",top:8,right:8,padding:"6px 10px",fontSize:11.5}}>{copied ? "Tersalin" : "Salin Kode"}</button>
                </div>
                <div className="field" style={{marginTop:10}}><label>URL Web App Apps Script</label><input type="text" placeholder="https://script.google.com/macros/s/XXXXX/exec" value={appsUrl} onChange={function(e){ setAppsUrl(e.target.value); }}/></div>
                {appsErr && <p className="error-text" style={{marginTop:8}}>{appsErr}</p>}
                <p className="hint" style={{marginTop:8}}>Kalau kolom ini dikosongkan lalu disimpan, SIMORIS kembali memakai penyimpanan lokal biasa (tanpa Google Sheet).</p>
                <div className="form-actions" style={{marginTop:10}}>
                  <button className="btn-ghost" onClick={saveAppsUrl}>Simpan Saja</button>
                  <button className="btn-dark" onClick={saveAndRefresh} disabled={savingApps}>{savingApps ? "Menyinkronkan..." : "Simpan & Sinkron Sekarang"}</button>
                </div>
              </div>
            )}
          </div>

          <div style={{borderTop:"1px solid var(--ink-100)",paddingTop:14}}>
            <p className="hint" style={{marginBottom:8,fontWeight:700,color:"var(--red)",textTransform:"uppercase",fontSize:11}}>Zona Bahaya</p>
            <div className="danger-zone">
              {masterMode ? (
                <p style={{fontSize:12.5,color:"var(--ink-600)",margin:"0 0 10px",lineHeight:1.5}}>Mode master Google Sheet sedang aktif — hapus banyak data sekaligus dilakukan langsung di Google Sheet (hapus barisnya), lalu klik <b>Refresh Google Sheet</b> di SIMORIS supaya tampilannya ikut sinkron. Tombol di bawah dinonaktifkan supaya data di SIMORIS tidak menyimpang dari sheet.</p>
              ) : (
                <p style={{fontSize:12.5,color:"var(--ink-600)",margin:"0 0 10px",lineHeight:1.5}}>Menghapus SEMUA data surat ({S.surats.length} surat) secara permanen dari perangkat ini. Kode klasifikasi dan pengaturan tidak ikut terhapus.</p>
              )}
              <button onClick={onOpenHapusSemua} disabled={masterMode}
                style={{width:"100%",padding:10,borderRadius:8,fontWeight:700,cursor:masterMode?"not-allowed":"pointer",background:masterMode?"var(--ink-100)":"var(--red)",color:masterMode?"var(--ink-400)":"#fff",border:"none"}}>
                Hapus Semua Data Surat
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}


/* ============================== APP ============================== */

function App(){
  const [authed, setAuthed] = useState(isoAuthedInit);
  const [S, setS] = useState(loadState);
  const sRef = useRef(S);
  useEffect(function(){ sRef.current = S; }, [S]);
  useEffect(function(){ saveState(S); }, [S]);

  function mutateS(mutator){
    setS(function(prev){ const next = cloneState(prev); mutator(next); return next; });
  }

  const masterMode = !!(S.settings.appsScriptUrl||"").trim();

  const [search, setSearch] = useState("");
  const [kodeFilter, setKodeFilter] = useState("");
  const [page, setPage] = useState(1);
  const [pageSize, setPageSize] = useState(50);

  // Info hasil sinkron terakhir: total surat di sheet & apakah yang dimuat cuma
  // sebagian (100 terbaru) atau semuanya.
  const [sheetInfo, setSheetInfo] = useState({ total:0, partial:false });
  const [loadingAll, setLoadingAll] = useState(false);

  // Pencarian sisi server: kalau mode master aktif, mengetik di kotak cari
  // memanggil action=search di Apps Script (mencari di SELURUH baris sheet
  // langsung di sana) supaya tidak perlu memuat ribuan baris dulu ke SIMORIS.
  const [searchResults, setSearchResults] = useState(null); // null = tidak sedang mencari server
  const [searching, setSearching] = useState(false);
  const searchSeq = useRef(0);

  const [modal, setModal] = useState(null); // 'surat' | 'kelola' | 'detail' | 'confirm' | 'notice' | 'hapusSemua'
  const [editingId, setEditingId] = useState(null);
  const [detailId, setDetailId] = useState(null);
  const [confirmMsg, setConfirmMsg] = useState("");
  const [confirmAction, setConfirmAction] = useState(null);
  const [noticeTitle, setNoticeTitle] = useState("");
  const [noticeMsg, setNoticeMsg] = useState("");
  const [downloadMenuOpen, setDownloadMenuOpen] = useState(false);
  const [refreshing, setRefreshing] = useState(false);
  const [submittingSurat, setSubmittingSurat] = useState(false);
  const [toast, setToast] = useState("");
  const toastTimer = useRef(null);
  const fileInputRef = useRef(null);

  function showToast(msg){
    setToast(msg);
    if(toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(function(){ setToast(""); }, 2600);
  }
  function showNotice(title, msg){ setNoticeTitle(title||"Pemberitahuan"); setNoticeMsg(msg); setModal("notice"); }
  function showConfirm(msg, onYes){ setConfirmMsg(msg); setConfirmAction(function(){ return onYes; }); setModal("confirm"); }
  function closeModal(){ setModal(null); }

  // Mode master + ada teks pencarian: cari langsung di Google Sheet (server)
  // supaya tetap cepat walau data yang termuat di SIMORIS baru sebagian
  // (mis. 100 terbaru). Di-debounce 400ms supaya tidak nembak request tiap
  // ketikan huruf. Query kosong -> kembali menampilkan data yang sudah dimuat.
  useEffect(function(){
    if(!masterMode || !search.trim()){
      setSearchResults(null);
      setSearching(false);
      return;
    }
    const mySeq = ++searchSeq.current;
    setSearching(true);
    const q = search.trim();
    const timer = setTimeout(async function(){
      const hasil = await callSheetAction(sRef.current, "search", { q: q }, 20000);
      if(searchSeq.current !== mySeq) return; // query sudah berubah lagi, buang hasil basi
      setSearching(false);
      if(hasil.ok && Array.isArray(hasil.rows)){
        setSearchResults(mapSheetRowsToDisplay(sRef.current, hasil.rows));
      }
      // gagal cari server -> biarkan searchResults apa adanya (fallback ke data lokal di bawah)
    }, 400);
    return function(){ clearTimeout(timer); };
  }, [search, masterMode]);

  const filtered = useMemo(function(){
    // Sedang mencari & mode master aktif: pakai hasil pencarian server (utuh,
    // dari SELURUH sheet) — bukan cuma data yang kebetulan sudah termuat lokal.
    if(masterMode && search.trim() && searchResults !== null){
      return searchResults.filter(function(x){
        const matchKode = !kodeFilter || String(x.kodeId) === kodeFilter;
        return matchKode;
      });
    }
    const sorted = S.surats; // sudah dijaga terurut menurun oleh mutateS
    if(!search && !kodeFilter) return sorted;
    const s = search.toLowerCase();
    return sorted.filter(function(x){
      let matchSearch = true;
      if(s){
        const hay = (x.perihal+" "+x.tujuan+" "+displayNomor(S,x)).toLowerCase();
        matchSearch = hay.indexOf(s) > -1;
      }
      const matchKode = !kodeFilter || String(x.kodeId) === kodeFilter;
      return matchSearch && matchKode;
    });
  }, [S, search, kodeFilter, searchResults, masterMode]);

  const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
  const safePage = Math.min(Math.max(1, page), totalPages);
  useEffect(function(){ if(page !== safePage) setPage(safePage); }, [safePage]);
  const start = (safePage-1) * pageSize;
  const rows = filtered.slice(start, start+pageSize);

  const editingSurat = editingId ? S.surats.find(function(x){ return x.id===editingId; }) : null;
  const detailSurat = detailId ? S.surats.find(function(x){ return x.id===detailId; }) : null;

  /* ---------- Surat CRUD ---------- */

  function openTambah(){
    setEditingId(null);
    setModal("surat");
    // Tidak lagi menyinkron ulang seluruh data di sini — preview nomor sudah
    // cukup akurat dari S.counter (dihitung dari total surat), dan menarik
    // ratusan baris tiap kali form dibuka bikin terasa lambat.
  }
  function openEdit(id){ setEditingId(id); setModal("surat"); }
  function closeSuratModal(){ setModal(null); setEditingId(null); }

  function finalizeNewSuratLocal(values, customMsg){
    let msg = customMsg;
    mutateS(function(draft){
      draft.counter += 1;
      const finalUrut = draft.counter;
      const nomorText = nomorSurat(draft, finalUrut, values.kodeId);
      draft.surats.unshift({ id:uid(), urut:finalUrut, kodeId:values.kodeId, tujuan:values.tujuan, perihal:values.perihal, tanggal:values.tanggal, dibuatOleh:values.dibuatOleh, sumber:"manual", nomorOverride:null });
      draft.surats.sort(function(a,b){ return b.urut-a.urut; });
      if(!msg) msg = "Nomor "+nomorText+" berhasil diterbitkan.";
    });
    setModal(null); setEditingId(null); setPage(1);
    showToast(msg);
  }

  async function handleSubmitSurat(values){
    const current = sRef.current;

    if(editingId){
      const existing = current.surats.find(function(x){ return x.id===editingId; });
      if(!masterMode || !existing){
        mutateS(function(draft){
          const s = draft.surats.find(function(x){ return x.id===editingId; });
          if(s){ s.kodeId=values.kodeId; s.tanggal=values.tanggal; s.tujuan=values.tujuan; s.perihal=values.perihal; s.dibuatOleh=values.dibuatOleh; }
        });
        setModal(null); setEditingId(null);
        showToast("Perubahan tersimpan.");
        return;
      }
      // Mode master: nomor TIDAK dihitung ulang dari kolom No (No & Nomor Surat
      // adalah dua hal terpisah) — angka urut di belakang nomor mengikuti kolom
      // No (B) di sheet apa adanya, hanya segmen kode klasifikasi yang berubah.
      // Ini sekaligus memperbaiki teks Nomor Surat lama yang mungkin salah/terpotong.
      setSubmittingSurat(true);
      const nomorBaru = nomorSurat(current, existing.urut, values.kodeId);
      const hasil = await callSheetAction(current, "update", { id: existing.id, tujuan:values.tujuan, tanggal: fmtTanggal(values.tanggal), perihal:values.perihal, nomor: nomorBaru });
      setSubmittingSurat(false);
      if(hasil.ok){
        // Terapkan langsung ke tampilan dari hasil respons (tidak menarik ulang
        // seluruh data) supaya terasa instan.
        mutateS(function(draft){
          const s = draft.surats.find(function(x){ return x.id===editingId; });
          if(s){ s.kodeId=values.kodeId; s.tanggal=values.tanggal; s.tujuan=values.tujuan; s.perihal=values.perihal; s.nomorOverride=nomorBaru; }
        });
        setModal(null); setEditingId(null);
        showToast("Perubahan tersimpan & tersinkron ke Google Sheet.");
      } else {
        showNotice("Gagal Sinkron ke Sheet", 'Perubahan BELUM disimpan supaya data SIMORIS tetap sama persis dengan Google Sheet.\n\n'+
          'Kemungkinan penyebab: perangkat tidak terhubung ke internet, URL Apps Script salah/belum diperbarui ke versi terbaru, atau baris ini sudah dihapus manual di sheet.\n\n'+
          'Coba lagi setelah memastikan koneksi internet aktif.'+(hasil.error?('\n\nDetail teknis: '+hasil.error):''));
      }
      return;
    }

    if(!masterMode){
      finalizeNewSuratLocal(values);
      return;
    }

    // Mode master: nomor HARUS diminta & dikonfirmasi oleh Google Sheet (lewat Apps
    // Script) supaya tidak pernah ada nomor "tebakan" lokal yang bisa bentrok.
    const kodeObjForPush = kodeOf(current, values.kodeId);
    setSubmittingSurat(true);
    const hasil = await callSheetAction(current, "add", {
      kode: kodeObjForPush ? kodeObjForPush.kode : "",
      instansi: current.settings.instansiKode,
      digit: current.settings.digit,
      tujuan: values.tujuan, tanggal: fmtTanggal(values.tanggal), perihal: values.perihal
    });
    setSubmittingSurat(false);
    if(hasil.ok && typeof hasil.id === "string"){
      // Terapkan langsung dari hasil respons (tidak menarik ulang seluruh data)
      // supaya terasa instan.
      mutateS(function(draft){
        const finalUrut = Number(hasil.no) || (draft.counter + 1);
        if(finalUrut > draft.counter) draft.counter = finalUrut;
        draft.surats.unshift({
          id: hasil.id, urut: finalUrut, kodeId: values.kodeId,
          tujuan: values.tujuan, perihal: values.perihal, tanggal: values.tanggal,
          dibuatOleh:"", sumber:"synced", nomorOverride: hasil.nomor
        });
        draft.surats.sort(function(a,b){ return b.urut-a.urut; });
      });
      setModal(null); setEditingId(null); setPage(1);
      showToast("Nomor "+hasil.nomor+" berhasil diterbitkan & tersimpan ke Google Sheet.");
      setSheetInfo(function(prev){ return { total: prev.total+1, partial: prev.partial }; });
    } else if(hasil.ok){
      showNotice("Skrip Apps Script Belum Diperbarui",
        'SIMORIS berhasil terhubung ke Apps Script, tetapi responsnya bukan format yang diharapkan — tandanya skrip yang ter-deploy masih versi lama.\n\n'+
        'Nomor surat TIDAK diterbitkan supaya tidak ada nomor ganda/salah format.\n\n'+
        'Perbaikan: buka Google Sheet → Extensions → Apps Script → salin ulang skrip terbaru dari "Kelola Kode" → Deploy → Manage deployments → ikon pensil → Version: "New version" → Deploy.');
    } else {
      showNotice("Gagal Terhubung ke Google Sheet", 'Nomor surat BELUM diterbitkan karena SIMORIS tidak berhasil menghubungi Google Sheet — ini disengaja, supaya tidak ada nomor ganda/bentrok.\n\n'+
        'Kemungkinan penyebab:\n1. Perangkat ini sedang tidak terhubung ke internet.\n2. URL Apps Script di "Kelola Kode" salah atau deployment-nya belum di-"Anyone".\n\n'+
        'Periksa koneksi lalu coba terbitkan lagi.'+(hasil.error?('\n\nDetail teknis: '+hasil.error):''));
    }
  }

  function handleDelete(s){
    showConfirm('Hapus surat "'+displayNomor(sRef.current, s)+'"? Tindakan ini tidak dapat dibatalkan.', async function(){
      if(!masterMode){
        mutateS(function(draft){ draft.surats = draft.surats.filter(function(x){ return x.id!==s.id; }); });
        setModal(null);
        showToast("Surat dihapus.");
        return;
      }
      setModal(null);
      const hasil = await callSheetAction(sRef.current, "delete", { id: s.id });
      if(hasil.ok){
        mutateS(function(draft){ draft.surats = draft.surats.filter(function(x){ return x.id!==s.id; }); });
        showToast("Surat dihapus & tersinkron ke Google Sheet.");
        setSheetInfo(function(prev){ return { total: Math.max(0,prev.total-1), partial: prev.partial }; });
      } else {
        showNotice("Gagal Sinkron ke Sheet", 'Surat BELUM dihapus supaya data SIMORIS tetap sama persis dengan Google Sheet.\n\n'+
          'Periksa koneksi internet lalu coba lagi.'+(hasil.error?('\n\nDetail teknis: '+hasil.error):''));
      }
    });
  }

  function openDetail(id){ setDetailId(id); setModal("detail"); }
  function closeDetail(){ setModal(null); setDetailId(null); }

  /* ---------- Ekspor / cetak ---------- */

  async function doExportExcel(){
    showToast("Menyiapkan file Excel...");
    const ok = await exportExcelFile(sRef.current, filtered);
    if(!ok) showNotice("Gagal Memuat Pustaka","Pustaka Excel gagal diambil dari internet. Periksa koneksi Anda lalu coba lagi.");
  }
  function doExportCsv(){ exportCsvFile(sRef.current, filtered); }
  async function doExportPdf(){
    showToast("Menyiapkan file PDF...");
    const ok = await exportPdfFile(sRef.current, filtered);
    if(!ok) showNotice("Gagal Memuat Pustaka","Pustaka PDF gagal diambil dari internet. Periksa koneksi Anda lalu coba lagi.");
  }
  function doPrint(){ window.print(); }
  function doBackupJson(){ exportJsonBackup(sRef.current); }

  /* ---------- Impor ---------- */

  function handleFileChange(e){
    const file = e.target.files[0];
    if(!file){ return; }
    const name = file.name.toLowerCase();
    if(/\.(xlsx|xls)$/.test(name)){
      const reader = new FileReader();
      reader.onload = function(ev){ handleImportedExcel(ev.target.result); };
      reader.readAsArrayBuffer(file);
    } else {
      const reader = new FileReader();
      reader.onload = function(ev){ handleImportedText(ev.target.result, file.name); };
      reader.readAsText(file, "UTF-8");
    }
    e.target.value = "";
  }

  function handleImportedText(text, filename){
    const isJson = /\.json$/i.test(filename) || /^\s*\{/.test(text);
    if(isJson) importJsonBackup(text);
    else importRowsLegacy(parseCsv(text));
  }
  function handleImportedExcel(buf){
    if(typeof XLSX === "undefined"){ showNotice("Pustaka Belum Siap","Pustaka pembaca Excel belum siap dimuat. Periksa koneksi internet Anda lalu muat ulang halaman."); return; }
    let wb;
    try{ wb = XLSX.read(buf, { type:"array", cellDates:true }); }
    catch(e){ showNotice("File Tidak Terbaca","File Excel tidak dapat dibaca. Pastikan file berformat .xlsx atau .xls yang valid."); return; }
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, { header:1, raw:true, defval:"" });
    const rows = raw.map(function(r){ return r.map(excelCellToStr); }).filter(function(r){ return r.some(function(c){ return String(c).trim()!==""; }); });
    importRowsLegacy(rows);
  }
  function importJsonBackup(text){
    let data;
    try{ data = JSON.parse(text); }catch(e){ showNotice("File Tidak Valid","File JSON tidak valid."); return; }
    if(!data || !Array.isArray(data.surats) || !Array.isArray(data.kodeList)){
      showNotice("Format Tidak Dikenali",'Struktur file JSON tidak dikenali. Gunakan file hasil tombol "Cadangkan".'); return;
    }
    showConfirm("Menimpa seluruh data saat ini ("+sRef.current.surats.length+" surat) dengan isi file cadangan ("+data.surats.length+" surat)?", function(){
      if(!data.settings) data.settings = { instansiKode:"W.9", digit:3, appsScriptUrl:"" };
      data.surats.sort(function(a,b){ return b.urut-a.urut; });
      setS(data);
      setPage(1);
      setModal(null);
      showToast("Data berhasil dipulihkan dari cadangan.");
    });
  }
  function importRowsLegacy(rows){
    if(rows.length < 2){ showNotice("File Kosong","File kosong atau tidak terbaca."); return; }
    const cols = detectColumns(rows);
    if(cols.idxPerihal === -1){ showNotice("Format Tidak Dikenali",'Kolom "Perihal" tidak ditemukan. Pastikan file memiliki kolom Perihal seperti pada format spreadsheet sebelumnya.'); return; }
    const parsedRows = parseRowsToSurats(rows, cols);
    let summary = null;
    mutateS(function(draft){ summary = applyImportToDraft(draft, parsedRows); });
    setPage(1);
    showToast(summary.ditambahkan+" surat diimpor"+(summary.dilewati?", "+summary.dilewati+" dilewati (sudah ada)":"")+".");
  }

  /* ---------- Google Sheet: sheet = MASTER, SIMORIS jadi cermin persis ---------- */

  // Mengubah baris hasil action=list dari Apps Script menjadi data surat SIMORIS,
  // lalu MENGGANTI TOTAL S.surats — supaya jumlah & isi di SIMORIS selalu identik
  // dengan yang ada di Google Sheet saat itu (tidak pernah menumpuk/dobel walau
  // di-refresh berkali-kali, dan baris yang diinput manual di sheet ikut muncul).
  // Urutan (No) SELALU diikuti apa adanya dari kolom B di sheet — bukan ditebak
  // dari teks Nomor Surat, karena teks itu bisa memuat angka yang salah/lama.
  function applySheetListToDraft(draft, sheetRows, totalHint){
    const fresh = sheetRows.map(function(r, idx){
      const tanggal = parseTanggalIndo(r.tanggal) || isoToday(0);
      const noNum = Number(r.no);
      // Sumber kebenaran utama untuk urutan: kolom "No" (B) di sheet apa adanya.
      const urut = (r.no !== "" && !isNaN(noNum) && noNum > 0) ? noNum : (idx+1);
      // Kode klasifikasi tetap diurai dari teks Nomor Surat (hanya dipakai
      // untuk label/warna & filter, tidak memengaruhi urutan/penomoran).
      const parsed = parseNomorRaw(r.nomor, draft.settings.instansiKode);
      const kodeObj = parsed ? ensureKodeInDraft(draft, parsed.kodeStr) : ensureKodeInDraft(draft, "SHEET");
      return {
        id: r.id, sheetNo: r.no, urut: urut,
        kodeId: kodeObj.id, tujuan: r.tujuan||"", perihal: r.perihal||"", tanggal: tanggal,
        dibuatOleh:"", sumber:"synced", nomorOverride: r.nomor||null
      };
    });
    // Nomor berikutnya = TOTAL surat di sheet + 1 — PERSIS rumus yang sama
    // dipakai server (Apps Script). Pakai totalHint (dari respons server) kalau
    // ada, karena saat memuat sebagian (mis. 100 terbaru) jumlah baris yang
    // termuat di SIMORIS TIDAK sama dengan total surat yang sebenarnya.
    draft.counter = (typeof totalHint === "number" && totalHint > 0) ? totalHint : fresh.length;
    // Urutkan menurun berdasarkan kolom No (B) — bukan sekadar membalik posisi
    // fisik baris di sheet — supaya tabel SIMORIS tetap konsisten walau baris
    // di sheet tidak tersusun rapi.
    fresh.sort(function(a,b){ return b.urut - a.urut; });
    draft.surats = fresh;
    // Buang kode klasifikasi hasil deteksi otomatis dari sinkron-sinkron
    // sebelumnya yang sekarang sudah tidak dipakai surat manapun (mis. bekas
    // salah baca kolom dulu) — supaya daftar di "Kelola Kode Klasifikasi"
    // tetap bersih. Kode yang ditambahkan manual oleh pengguna TIDAK disentuh.
    const usedKodeIds = {};
    fresh.forEach(function(s){ usedKodeIds[s.kodeId] = true; });
    draft.kodeList = draft.kodeList.filter(function(k){
      return k.nama !== "Impor otomatis" || usedKodeIds[k.id];
    });
  }

  async function refreshFromSheet(silent, count){
    const current = sRef.current;
    if(!(current.settings.appsScriptUrl||"").trim()){
      if(!silent){
        showNotice("Belum Diatur",'URL Apps Script (Google Sheet) belum diatur.\n\nBuka "Kelola Kode" → bagian "Sinkron Google Sheet" untuk mengaturnya terlebih dahulu.');
        setModal("kelola");
      }
      return;
    }
    setRefreshing(true);
    const params = count ? { count: count } : {};
    const hasil = await callSheetAction(current, "list", params, 30000);
    setRefreshing(false);
    if(hasil.ok && Array.isArray(hasil.rows)){
      mutateS(function(draft){ applySheetListToDraft(draft, hasil.rows); });
      setPage(1);
      setSheetInfo({ total: typeof hasil.total==="number" ? hasil.total : hasil.rows.length, partial: !!hasil.partial });
      if(!silent){
        showToast(hasil.partial
          ? ("Dimuat "+hasil.rows.length+" surat terbaru dari total "+hasil.total+".")
          : ("Sinkron selesai — "+hasil.rows.length+" surat, sama persis dengan Google Sheet."));
      }
    } else if(hasil.ok && !Array.isArray(hasil.rows)){
      // Respons "ok" tapi bentuknya tidak sesuai action=list -> skrip Apps Script
      // yang terpasang masih versi LAMA. Jangan terapkan apa pun ke data lokal.
      showNotice("Skrip Apps Script Belum Diperbarui",
        'SIMORIS berhasil terhubung ke Apps Script, tetapi responsnya bukan format daftar surat — tandanya skrip yang ter-deploy masih versi lama.\n\n'+
        'Perbaikan: buka Google Sheet → Extensions → Apps Script → salin ulang skrip terbaru dari "Kelola Kode" di SIMORIS → Deploy → Manage deployments → ikon pensil → Version: "New version" → Deploy.\n\n'+
        'Data di SIMORIS TIDAK diubah supaya aman.');
    } else if(!silent){
      showNotice("Gagal Sinkron",'Gagal mengambil data dari Google Sheet.\n\n'+
        'Kemungkinan penyebab:\n'+
        '1. URL Apps Script salah atau deployment belum diatur ke akses "Anyone".\n'+
        '2. Skrip di Apps Script belum diperbarui ke versi terbaru (salin ulang dari "Kelola Kode").\n'+
        '3. Perangkat ini sedang tidak terhubung ke internet.\n\n'+
        (hasil.error ? ('Detail teknis: '+hasil.error) : ''));
    }
  }

  async function handleLoadAll(){
    setLoadingAll(true);
    await refreshFromSheet(false); // tanpa count = ambil SEMUA data
    setLoadingAll(false);
  }

  // Sinkron otomatis sekali saat aplikasi dibuka, kalau mode master aktif —
  // hanya 100 surat TERBARU dulu (cepat), supaya buka aplikasi tidak berat.
  // Pengguna bisa klik "Muat Semua Data" kapan saja kalau perlu lihat semuanya.
  useEffect(function(){
    if(authed && masterMode) refreshFromSheet(true, 100);
    // eslint-disable-next-line
  }, [authed]);

  /* ---------- Hapus semua ---------- */

  function confirmHapusSemua(){
    mutateS(function(draft){ draft.surats = []; draft.counter = 0; });
    setModal(null);
    showToast("Semua data surat telah dihapus.");
  }

  /* ---------- Logout ---------- */

  function handleLogout(){
    showConfirm("Keluar dari SIMORIS? Anda perlu memasukkan kata sandi lagi untuk membuka kembali.", function(){
      setAuthedStorage(false);
      setAuthed(false);
      setModal(null);
    });
  }

  if(!authed) return <LoginScreen onSuccess={function(){ setAuthed(true); }}/>;

  const paginationProps = {
    page: safePage, totalPages: totalPages, total: filtered.length, pageSize: pageSize, start: start,
    onPrev: function(){ setPage(Math.max(1, safePage-1)); },
    onNext: function(){ setPage(safePage+1); },
    onPage: function(n){ setPage(n); },
    onPageSize: function(n){ setPageSize(n); setPage(1); }
  };

  return (
    <div className="paper-texture" style={{minHeight:"100vh"}}>
      <Header count={S.surats.length} onKelola={function(){ setModal("kelola"); }} onTambah={openTambah} onLogout={handleLogout}/>
      <main className="wrap">
        <Toolbar
          search={search} onSearch={function(v){ setSearch(v); setPage(1); }}
          kodeFilter={kodeFilter} onKodeFilter={function(v){ setKodeFilter(v); setPage(1); }}
          aktifKodeList={aktifKode(S)}
          onRefreshSheet={function(){ refreshFromSheet(false, 100); }} refreshing={refreshing}
          onLoadAll={handleLoadAll} loadingAll={loadingAll} searching={searching}
          onImportClick={function(){ fileInputRef.current && fileInputRef.current.click(); }}
          fileInputRef={fileInputRef} onFileChange={handleFileChange}
          downloadMenuOpen={downloadMenuOpen} setDownloadMenuOpen={setDownloadMenuOpen}
          onExportExcel={doExportExcel} onExportCsv={doExportCsv} onExportPdf={doExportPdf} onPrint={doPrint} onBackupJson={doBackupJson}
          masterMode={masterMode}
        />
        <Banner masterMode={masterMode} sheetInfo={sheetInfo}/>
        <SuratTable
          S={S} rows={rows} pageInfo={{ total: filtered.length }}
          onRowClick={openDetail} onEdit={openEdit} onDelete={handleDelete}
          paginationProps={paginationProps}
        />
      </main>

      <SuratModal open={modal==="surat"} editing={editingSurat} S={S} onClose={closeSuratModal} onSubmit={handleSubmitSurat} submitting={submittingSurat}/>
      <KelolaModal
        open={modal==="kelola"} S={S} onClose={function(){ setModal(null); }} mutateS={mutateS}
        showToast={showToast} showNotice={showNotice} showConfirm={showConfirm}
        onOpenHapusSemua={function(){ setModal("hapusSemua"); }}
        onSaveAndRefresh={function(){ refreshFromSheet(false); }}
        masterMode={masterMode}
      />
      <DetailModal open={modal==="detail"} surat={detailSurat} S={S} onClose={closeDetail} onEdit={function(id){ setEditingId(id); setModal("surat"); }}/>
      <ConfirmModal open={modal==="confirm"} message={confirmMsg} onYes={function(){ setModal(null); if(confirmAction) confirmAction(); }} onNo={function(){ setModal(null); setConfirmAction(null); }}/>
      <NoticeModal open={modal==="notice"} title={noticeTitle} message={noticeMsg} onClose={function(){ setModal(null); }}/>
      <HapusSemuaModal open={modal==="hapusSemua"} count={S.surats.length} onClose={function(){ setModal(null); }} onConfirm={confirmHapusSemua}/>

      <Toast message={toast}/>
      <footer className="app-footer">SIMORIS · data tersimpan di peramban perangkat ini<br/>Dibuat oleh IT Pokja SDM</footer>
    </div>
  );
}

function isoAuthedInit(){ return isAuthedStorage(); }

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
